syntax = "proto3";

package common;

import "common/filter.proto";
import "common/language.proto";
import "common/order.proto";
import "common/payment.proto";
import "common/product.proto";
import "common/shipment.proto";
import "google/protobuf/timestamp.proto";
import "google/type/decimal.proto";

option go_package = "github.com/jekabolt/grbpwr-manager/proto/gen/common;common";

message Dictionary {
  repeated Category categories = 1;
  repeated MeasurementName measurements = 2;
  repeated OrderStatus order_statuses = 3;
  repeated PaymentMethod payment_methods = 4;
  repeated ShipmentCarrier shipment_carriers = 5;
  repeated Size sizes = 6;
  repeated Collection collections = 13;
  repeated Language languages = 7;
  bool site_enabled = 8;
  int32 max_order_items = 9;
  string base_currency = 10;
  bool big_menu = 11;
  Announce announce = 12;
  int32 order_expiration_seconds = 14; // 0 = use payment handler default
  map<string, google.type.Decimal> complimentary_shipping_prices = 15; // Map of currency code to minimum subtotal for free shipping
  bool is_prod = 16; // true = prod Stripe (CARD), false = test Stripe (CARD_TEST)
  // Hero section background color for the storefront (CSS). Empty if unset.
  string background_hero_color = 17;
  repeated string product_tags = 18; // all distinct tags across visible products
  repeated Color colors = 19; // controlled colour dictionary (SKU colour segment source)
}

message Collection {
  string name = 1;
  int32 count_men = 2;
  int32 count_women = 3;
  string code = 4; // R9: stable code, FK target for tech_card.collection_id resolution
  bool archived = 5; // R9: archive-not-delete
}

// Country is an ISO 3166-1 alpha-2 controlled dictionary (R9). Arbitrary creation is forbidden — the
// full ISO list is seeded and only activation toggles.
message Country {
  string code = 1; // ISO 3166-1 alpha-2, uppercase (public key)
  string name = 2; // localized display name
  bool active = 3;
}

// Tag is a controlled merchandising tag dictionary (R9). Storefront receives tags by code/name; id is
// admin-only.
message Tag {
  string code = 1;
  string name = 2;
  bool archived = 3;
  int32 id = 4; // admin-only
}

// DictionaryRevision is a per-namespace revision snapshot used for cross-instance cache invalidation (R9).
message DictionaryRevision {
  string namespace = 1; // "color" | "collection" | "tag" | "country"
  uint64 revision = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message Genders {
  GenderEnum id = 1;
  string name = 2;
}

message OrderFactors {
  OrderFactor id = 1;
  string name = 2;
}

message SortFactors {
  SortFactor id = 1;
  string name = 2;
}
