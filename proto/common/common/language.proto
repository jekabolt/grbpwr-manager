syntax = "proto3";

package common;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/jekabolt/grbpwr-manager/proto/gen/common;common";

message Language {
  int32 id = 1;
  string code = 2; // ISO 639-1 language code (e.g., en, es, fr)
  string name = 3; // Human readable language name
  bool is_default = 4; // Indicates the default/fallback language
  bool is_active = 5; // Whether this language is currently supported
}

message ProductInsertTranslation {
  int32 language_id = 1;
  string name = 2;
  string description = 3;
}

message ArchiveInsertTranslation {
  int32 language_id = 1;
  string heading = 2;
  string description = 3;
}

// HeroCopyTranslation is the single, shared translation for every hero block.
// Each block type uses only the subset of fields it needs:
//   single/double        -> headline, explore_text
//   main                 -> tag, body, headline, explore_text
//   featured_products    -> headline, explore_text
//   featured_products_tag-> headline, explore_text
//   featured_archive     -> headline, explore_text
// (further fields — subhead, cta_text, caption, placeholder, success_text —
//  are reserved for the block types added on top of this foundation.)
message HeroCopyTranslation {
  int32 language_id = 1;
  string tag = 2;
  string headline = 3;
  string subhead = 4;
  string body = 5;
  string cta_text = 6;
  string explore_text = 7;
  string caption = 8;
  string placeholder = 9;
  string success_text = 10;
}

message NavFeaturedEntityInsertTranslation {
  int32 language_id = 1;
  string explore_text = 2;
}

message AnnounceTranslation {
  int32 language_id = 1;
  string text = 2;
}

message Announce {
  string link = 1;
  repeated AnnounceTranslation translations = 2;
}
