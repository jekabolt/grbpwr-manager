syntax = "proto3";

package common;

import "common/media.proto";
import "common/product.proto";
import "google/protobuf/timestamp.proto";
import "google/type/decimal.proto";

option go_package = "github.com/jekabolt/grbpwr-manager/proto/gen/common;common";

// TechCardStage is the development stage of a tech pack: prototype, fit sample,
// salesman sample, pre-production, production.
enum TechCardStage {
  TECH_CARD_STAGE_UNKNOWN = 0;
  TECH_CARD_STAGE_PROTO = 1;
  TECH_CARD_STAGE_FIT = 2;
  TECH_CARD_STAGE_SMS = 3;
  TECH_CARD_STAGE_PP = 4;
  TECH_CARD_STAGE_PROD = 5;
  TECH_CARD_STAGE_IDEA = 6; // draft: moodboard/concept before a style number (new-flow NF-03)
}

// TechCardApprovalState is the gating release state of a tech card, orthogonal to
// TechCardStage (which tracks development progress). A factory must only receive a
// card in the RELEASED state.
enum TechCardApprovalState {
  TECH_CARD_APPROVAL_STATE_UNKNOWN = 0; // defaults to DRAFT on write
  TECH_CARD_APPROVAL_STATE_DRAFT = 1;
  TECH_CARD_APPROVAL_STATE_IN_REVIEW = 2;
  TECH_CARD_APPROVAL_STATE_APPROVED = 3;
  TECH_CARD_APPROVAL_STATE_RELEASED = 4;
  TECH_CARD_APPROVAL_STATE_OBSOLETE = 5;
}

// TechCardMeasurementUnit is the unit for the card's geometry (callout dimensions).
// Metric only — the brand works in cm and mm, never inches.
enum TechCardMeasurementUnit {
  TECH_CARD_MEASUREMENT_UNIT_UNKNOWN = 0; // defaults to MM on write (the brand works in mm)
  TECH_CARD_MEASUREMENT_UNIT_CM = 1; // back-compat; clients should stop sending CM
  TECH_CARD_MEASUREMENT_UNIT_MM = 2;
}

// TechCardMediaKind classifies a tech-card sketch image.
enum TechCardMediaKind {
  TECH_CARD_MEDIA_KIND_UNKNOWN = 0;
  TECH_CARD_MEDIA_KIND_FRONT = 1; // front flat sketch
  TECH_CARD_MEDIA_KIND_BACK = 2; // back flat sketch
  TECH_CARD_MEDIA_KIND_DETAIL = 3; // detail / construction node
  TECH_CARD_MEDIA_KIND_LINING = 4; // internal structure / lining
  TECH_CARD_MEDIA_KIND_PREVIEW = 5; // cover preview
  TECH_CARD_MEDIA_KIND_MOODBOARD = 6; // mood / inspiration board
  TECH_CARD_MEDIA_KIND_REFERENCE = 7; // reference / fabric photo
  TECH_CARD_MEDIA_KIND_SWATCH = 8; // colour / fabric swatch
}

// TechCardMediaItem is a writable sketch-media reference (id + kind).
message TechCardMediaItem {
  int32 media_id = 1; // FK media(id)
  TechCardMediaKind kind = 2;
  string caption = 3; // image caption / view name
}

// TechCardMediaFull is a resolved sketch-media reference for display.
message TechCardMediaFull {
  MediaFull media = 1;
  TechCardMediaKind kind = 2;
  string caption = 3; // image caption / view name
}

// TechCardCallout is a numbered detail note pointing at the technical sketch.
message TechCardCallout {
  int32 number = 1; // callout number on the sketch
  string part = 2; // деталь / узел
  string description = 3; // описание, уточнение
  string dimensions = 4; // размеры / привязка
  int32 media_id = 5; // FK media(id); sketch this callout is pinned to (0 = unanchored)
  google.type.Decimal pos_x = 6; // normalised x (0..1) of the marker on its sketch
  google.type.Decimal pos_y = 7; // normalised y (0..1) of the marker on its sketch
}

// TechCardRevision is one entry in the spec-document changelog (what changed in
// which section, by whom). This is NOT fit history — fitting verdicts and
// measurements live in the separate fitting feature.
message TechCardRevision {
  string version = 1;
  google.protobuf.Timestamp revision_date = 2;
  string author = 3;
  string section = 4; // раздел
  string change_note = 5; // что изменено
}

// TechCardBomSection groups a BOM line by material family (Sheet «Спецификация»).
enum TechCardBomSection {
  TECH_CARD_BOM_SECTION_UNKNOWN = 0;
  TECH_CARD_BOM_SECTION_FABRIC = 1; // основные ткани
  TECH_CARD_BOM_SECTION_LINING = 2; // подклад
  TECH_CARD_BOM_SECTION_INTERLINING = 3; // приклад / дублерин
  TECH_CARD_BOM_SECTION_INSULATION = 4; // утеплитель / объём
  TECH_CARD_BOM_SECTION_HARDWARE = 5; // фурнитура
  TECH_CARD_BOM_SECTION_THREAD = 6; // нитки
  TECH_CARD_BOM_SECTION_LABEL = 7; // этикетки и маркировка
  TECH_CARD_BOM_SECTION_PACKAGING = 8; // упаковка
  TECH_CARD_BOM_SECTION_TRIM = 9; // soft trims: бейка / тесьма / резинка / кант / шнур / лента (not hardware fittings)
  TECH_CARD_BOM_SECTION_DECORATION = 10; // принт / вышивка / аппликация / патч / стразы
  TECH_CARD_BOM_SECTION_OTHER = 11; // прочее (catch-all)
}

// TechCardLabDipStatus is the lab-dip approval lifecycle of a colourway.
enum TechCardLabDipStatus {
  TECH_CARD_LAB_DIP_STATUS_UNKNOWN = 0; // defaults to PENDING on write
  TECH_CARD_LAB_DIP_STATUS_PENDING = 1;
  TECH_CARD_LAB_DIP_STATUS_SUBMITTED = 2;
  TECH_CARD_LAB_DIP_STATUS_APPROVED = 3;
  TECH_CARD_LAB_DIP_STATUS_REJECTED = 4;
}

// TechCardPurpose is the numeric enum form of a style's purpose (R6). Replaces the free-text
// `purpose` field; UNKNOWN is rejected on write.
enum TechCardPurpose {
  TECH_CARD_PURPOSE_UNKNOWN = 0;
  TECH_CARD_PURPOSE_SELLABLE = 1;
  TECH_CARD_PURPOSE_AUXILIARY = 2;
}

// ColorwayDevelopmentInsert carries the PLM / lab-dip development fields that moved onto the colourway
// (product) in the R1 merge: ex tech_card_colorway.code/name/hex/comment become dev_code/name/dev_hex/
// comment. Lives in techcard.proto to reach TechCardLabDipStatus and the usage recipe without a circular
// import (product.proto cannot import techcard.proto). NOTE: `usages` (the material recipe) is keyed by
// an explicit colorway_id = product.id (R1/§14.3); the positional colorway_index model is gone.
message ColorwayDevelopmentInsert {
  string dev_code = 1; // ex TechCardColorway.code (internal article code)
  string name = 2; // internal colourway label
  TechCardLabDipStatus lab_dip_status = 3;
  string comment = 4;
  string pantone = 5;
  string pantone_system = 6;
  string dev_hex = 7; // ex hex; screen approximation #RRGGBB
  int32 swatch_media_id = 8;
  int32 lab_dip_round = 9;
  google.protobuf.Timestamp lab_dip_submitted_at = 10;
  google.protobuf.Timestamp lab_dip_decided_at = 11;
  string lab_dip_decided_by = 12;
  string lab_dip_reject_reason = 13;
  repeated TechCardColorwayUsage usages = 14; // material recipe (bom_item_index into the owning style's BOM)
  int32 display_order = 15;
}

message ColorwayDevelopment {
  ColorwayDevelopmentInsert development = 1;
  Color dictionary_color = 2; // output-only resolved dictionary colour
}

// StyleSizeChart is the style-owned size chart (R5). Written full-replace under the shared
// tech_card.lock_version; there is no separate chart version.
message StyleSizeChartCell {
  int32 size_id = 1;
  int32 measurement_name_id = 2;
  google.type.Decimal value = 3;
}

message StyleSizeChart {
  int32 style_id = 1;
  int32 lock_version = 2;
  repeated StyleSizeChartCell cells = 3;
}

// AdminColorwayRef is a derived, output-only reference to a colourway from its style (R1: GetStyle may
// return its colourways, but they are not writable through the style).
message AdminColorwayRef {
  int32 colorway_id = 1;
  string base_sku = 2;
  string color_code = 3;
  ColorwayLifecycleStatus status = 4;
}

// TechCardColorway is a development colourway (Sheet «Колористика» columns). It is
// distinct from tech_card_product (published catalog SKUs); product_id optionally
// links the published SKU that realises this colourway.
message TechCardColorway {
  string code = 1; // internal/article colourway code; never used as the SKU colour segment
  string name = 2; // internal colourway label; never used as the SKU colour source
  TechCardLabDipStatus lab_dip_status = 3; // UNKNOWN defaults to PENDING
  int32 product_id = 4; // FK product(id); 0 = not yet published. Auto-added to the card's product_ids on save (annotation ⊆ the canon tech_card_product list)
  string comment = 5;
  string pantone = 6; // headline Pantone code
  string pantone_system = 7; // TCX|TPX|TPG|C|U (Pantone book)
  string hex = 8; // screen approximation #RRGGBB
  int32 swatch_media_id = 9; // FK media(id); approved physical swatch; 0 = none
  int32 lab_dip_round = 10; // submission round (1, 2, …); 0 = unset
  google.protobuf.Timestamp lab_dip_submitted_at = 11;
  google.protobuf.Timestamp lab_dip_decided_at = 12;
  string lab_dip_decided_by = 13;
  string lab_dip_reject_reason = 14;
  // the colour's material recipe: which catalog article (bom_item_index) goes on which
  // garment part, in what colour, at what consumption. Per-colourway divergence lives here.
  repeated TechCardColorwayUsage usages = 16;
  reserved 15; // was `materials` (OUTPUT-ONLY); usages + bom_items resolve it now
  // OUTPUT-ONLY stable row id (B-10): set on Get/List so a sample can be linked to a colourway
  // (Sample.colorway_id). Ignored on write — a card save full-replaces colourways with fresh ids
  // (the server re-points existing sample links by colourway identity, case-folded code+name), so
  // re-read the card and use a fresh id right before linking a sample.
  int32 id = 17;
  // Canonical controlled-colour dictionary code. REQUIRED on every write; exactly 3 uppercase
  // characters and must exist in Dictionary.colors. No fallback from code/name/pantone/hex.
  string color_code = 18;
  // OUTPUT-ONLY resolved dictionary entry for display. The server ignores it on write.
  Color dictionary_color = 19;
}

// TechCardColorwayUsage is one material use inside a colourway: which catalog article
// (bom_item_index) goes on which garment part (placement), the colour it takes HERE, and
// how much is consumed (per-garment and/or per-size). The BOM is a pure article catalog;
// per-colourway divergence lives here.
message TechCardColorwayUsage {
  // explicit presence: index 0 is a real BOM line, distinct from "unset"
  // (mirrors TechCardOperation.bom_item_index).
  optional int32 bom_item_index = 1; // FK → TechCardInsert.bom_items
  string placement = 2; // garment part: outer / inner collar / lining / sleeve …
  // matched (trim+lower) against TechCardOperation.placement
  string color = 3; // material colour in THIS colourway — material-specific,
  // independent of TechCardColorway.pantone (the swatch colour)
  string pantone = 4; // material Pantone / code in this colourway
  google.type.Decimal consumption = 5; // per-garment rate (measured materials); fallback when size_consumptions empty
  google.type.Decimal quantity = 6; // count (countable trims)
  repeated TechCardBomSizeConsumption size_consumptions = 7; // per-size rate; size_id ∈ TechCardInsert.size_ids
  google.type.Decimal line_total = 8; // OUTPUT-ONLY (per-garment)
  google.type.Decimal size_run_total = 9; // OUTPUT-ONLY (whole run)
  // explicit presence: 0-based index into TechCardInsert.pieces saying which cut-piece this
  // consumption norm is about; unset = whole garment (informational, NF-05).
  optional int32 piece_index = 10;
}

// TechCardDetail is one aspect of the construction description (Sheet «Титул», lower block)
// with optional reference images. key is freeform (silhouette/collar/fastening/pockets/
// sleeve_cuff/topstitching/extra_details … or a custom aspect).
message TechCardDetail {
  string key = 1;
  string text = 2;
  repeated int32 media_ids = 3; // FK media(id)
}

// TechCardBomItem is one bill-of-materials line — a catalog article (Sheet «Спецификация»).
// The per-colourway colour, placement and consumption live on TechCardColorwayUsage; the
// BOM line is now a pure material-article catalog entry.
message TechCardBomItem {
  TechCardBomSection section = 1; // required
  string name = 2; // required
  string supplier = 4;
  string supplier_ref = 5; // артикул поставщика
  string color = 6; // base/default reference colour (the per-colourway colour is on the usage)
  string composition = 7; // состав (the frontend may store structured-JSON here, like product style)
  string spec = 8; // ширина / плотность
  string unit = 10; // ед. (м/см/г for measured materials; pcs for countable trims)
  google.type.Decimal unit_price = 12; // цена/ед.
  string currency = 13; // ISO 4217 for unit_price
  string comment = 14;
  // fabric data for the cutter / marker (Phase 3.5c)
  google.type.Decimal fabric_width = 17; // usable width, cm
  google.type.Decimal fabric_weight_gsm = 18; // weight, g/m²
  TechCardFabricDirection fabric_direction = 19; // nap / layout
  google.type.Decimal wastage_percent = 20; // cutting wastage %, folded into the usage line totals
  // material_id optionally links this line to a catalog Material (task 10). The line keeps its
  // own snapshot fields regardless; 0 means unlinked (free-text / legacy).
  int64 material_id = 23;
  // → TechCardColorwayUsage: placement, consumption, quantity, colorway_colors, line_total,
  //   size_consumptions, size_run_total all moved onto the per-colourway usage.
  reserved 3, 9, 11, 15, 16, 21, 22;
}

// Material is a catalog material — shared nomenclature a tech-card BOM line can optionally link
// to. Descriptive fields only; price lives in the append-only MaterialPrice history.
message Material {
  int64 id = 1;
  string name = 2; // required
  TechCardBomSection section = 3; // required; same enum as a BOM line
  string supplier = 4;
  string supplier_ref = 5;
  string composition = 6;
  string spec = 7; // ширина / плотность
  string unit = 8;
  google.type.Decimal fabric_width = 9; // usable width, cm
  google.type.Decimal fabric_weight_gsm = 10; // weight, g/m²
  bool archived = 11;
  // latest_price is the current (latest-effective) price, if any (read-only; set via
  // AddMaterialPrice). Absent when the material has no price history yet.
  MaterialPrice latest_price = 12;
  // Warehouse catalog fields (new-flow NF-02).
  string code = 13; // internal article code (ours), unique among non-archived materials
  string color = 14; // colour of the purchased article
  string pantone = 15;
  google.type.Decimal min_stock = 16; // low-stock alert threshold, in `unit`
  string notes = 17;
}

// MaterialPrice is one point in a material's append-only price history. Prices are in the
// purchase currency (fold to base via costing FX rates).
message MaterialPrice {
  int64 material_id = 1;
  google.type.Decimal price = 2;
  string currency = 3; // ISO 4217
  google.protobuf.Timestamp valid_from = 4; // the price applies from this date
  string source = 5; // manual | production_run
  string note = 6;
}

// TechCardReleaseMeta is the header of an immutable release snapshot (task 11) without the
// JSON blob — the frozen spec + planned unit cost captured when a card entered `released`.
// The full snapshot (a proto-JSON contract TechCard) is fetched via GetTechCardRelease.
message TechCardReleaseMeta {
  int32 id = 1;
  int32 tech_card_id = 2;
  string version = 3; // tech_card.version at release time
  string released_by = 4; // acting admin username at release time
  google.type.Decimal unit_cost = 5; // base-currency planned unit cost, if foldable
  string currency = 6; // currency of unit_cost
  google.protobuf.Timestamp created_at = 7;
}

// TechCardDevExpenseInsert is the writable payload for one development (R&D) cost row (task 14):
// a one-off "spent Amount on Kind" record. amount_base is computed server-side (via costing FX);
// clients do not send it.
message TechCardDevExpenseInsert {
  int32 tech_card_id = 1;
  string kind = 2; // sample|materials|labour|outsourcing|other
  string description = 3;
  google.type.Decimal amount = 4;
  string currency = 5; // ISO 4217
  int32 fitting_id = 6; // 0 = not tied to a fitting round
  google.protobuf.Timestamp incurred_at = 7; // date the cost was incurred (optional)
  int32 sample_id = 8; // 0 = not tied to a sample (new-flow NF-04)
}

// TechCardDevExpense is one stored development-cost journal row. amount_base folds amount to base
// (EUR) via costing FX (unset when the currency has no rate).
message TechCardDevExpense {
  int32 id = 1;
  int32 tech_card_id = 2;
  string kind = 3;
  string description = 4;
  google.type.Decimal amount = 5;
  string currency = 6;
  google.type.Decimal amount_base = 7; // base currency (EUR); unset if not foldable
  int32 fitting_id = 8; // 0 = none
  google.protobuf.Timestamp incurred_at = 9;
  google.protobuf.Timestamp created_at = 10;
  int32 sample_id = 11; // 0 = none (new-flow NF-04)
}

// TechCardDevCostByKind is the base-currency development spend for one kind.
message TechCardDevCostByKind {
  string kind = 1;
  google.type.Decimal amount_base = 2;
}

// TechCardDevCostSummary is the computed roll-up of a style's development spend (output-only).
message TechCardDevCostSummary {
  google.type.Decimal total_base = 1; // Σ amount_base over foldable rows (EUR)
  bool has_unconverted = 2; // some row lacked amount_base (missing FX rate) → total is partial
  repeated TechCardDevCostByKind by_kind = 3; // Σ per kind
  // Amortized informational figure: production unit_cost + total_base / Σ order_qty — how much
  // development adds to each unit at the current size run. Unset when order_qty is 0 or the
  // production unit cost is unavailable. NOT part of cost_price (development is a period cost).
  google.type.Decimal unit_cost_with_dev = 4;
  int32 order_qty = 5; // Σ size order_qty used for amortization
}

// TechCardBomSizeConsumption is the per-size consumption (норма расхода) of one BOM
// material — different sizes consume different amounts of fabric.
message TechCardBomSizeConsumption {
  int32 size_id = 1; // FK size(id); must be one of TechCardInsert.size_ids
  google.type.Decimal consumption = 2; // per-garment rate at this size, in the line's `unit`
}

// TechCardFabricDirection is the cutting layout a fabric requires.
enum TechCardFabricDirection {
  TECH_CARD_FABRIC_DIRECTION_UNKNOWN = 0;
  TECH_CARD_FABRIC_DIRECTION_ANY = 1; // all-way (no nap)
  TECH_CARD_FABRIC_DIRECTION_ONE_WAY = 2; // napped / directional, one-way marker
  TECH_CARD_FABRIC_DIRECTION_TWO_WAY = 3; // two-way
}

// TechCardSizeQuantity is the production order quantity for a size (size run).
message TechCardSizeQuantity {
  int32 size_id = 1; // FK size(id); must be one of size_ids
  int32 order_qty = 2;
}

// TechCardSizePattern is a downloadable PDF выкройка (cut pattern) for one size of a
// tech card — the FINAL pattern for that size. A size can carry many patterns (pieces
// split across sheets). The PDF is uploaded via Admin.UploadPattern, which returns the
// url stored here; the binary lives in object storage, not the media library.
message TechCardSizePattern {
  int32 size_id = 1; // FK size(id); must be one of TechCardInsert.size_ids
  string url = 2; // CDN url of the uploaded PDF (required)
  string filename = 3; // original filename, for display / download
  int64 size_bytes = 4; // file size in bytes (0 = unknown)
}

// TechCardLabelType classifies a label / tag (Sheet «Этикетки и упаковка»).
enum TechCardLabelType {
  TECH_CARD_LABEL_TYPE_UNKNOWN = 0;
  TECH_CARD_LABEL_TYPE_MAIN = 1; // основная (бренд)
  TECH_CARD_LABEL_TYPE_SIZE = 2; // размерная
  TECH_CARD_LABEL_TYPE_CARE = 3; // состав / уход
  TECH_CARD_LABEL_TYPE_ORIGIN = 4; // страна производства
  TECH_CARD_LABEL_TYPE_FLAG = 5; // флаговая
  TECH_CARD_LABEL_TYPE_HANGTAG = 6; // навесной ярлык (хэнгтег)
  TECH_CARD_LABEL_TYPE_BARCODE = 7; // штрихкод / RFID
  TECH_CARD_LABEL_TYPE_SPECIAL = 8; // спецэтикетка
}

// TechCardConstruction holds general workmanship parameters (Sheet «Обработка»).
message TechCardConstruction {
  string main_stitch_type = 1; // тип основной машинной строчки
  string stitch_density = 2; // плотность строчки по умолчанию (стеж/см)
  string overlock_threads = 3; // оверлок, кол-во ниток
  string seam_allowances = 4; // припуски на швы (общие)
  string hem_finish = 5; // обработка низа / подгибка
  string pressing = 6; // ВТО / финишная отделка
  string machine_class = 7; // класс / группа машин
  string notes = 8;
  reserved 9, 10; // labour pricing removed (was labour_rate, labour_rate_currency)
}

// TechCardOperationType classifies an operation by its machine / stitch class
// (replaces the coarse seaming/overlock/decorative split with the real sewing
// taxonomy the factory works in).
enum TechCardOperationType {
  TECH_CARD_OPERATION_TYPE_UNKNOWN = 0;
  TECH_CARD_OPERATION_TYPE_LOCKSTITCH = 1; // челночный (301)
  TECH_CARD_OPERATION_TYPE_DOUBLE_NEEDLE = 2; // двухигольная
  TECH_CARD_OPERATION_TYPE_OVERLOCK = 3; // оверлок (504/516)
  TECH_CARD_OPERATION_TYPE_COVERSTITCH = 4; // плоскошовная (распошивалка)
  TECH_CARD_OPERATION_TYPE_CHAINSTITCH = 5; // цепной стежок (401)
  TECH_CARD_OPERATION_TYPE_BLINDHEM = 6; // потайная подшивка
  TECH_CARD_OPERATION_TYPE_BARTACK = 7; // закрепка
  TECH_CARD_OPERATION_TYPE_BUTTONHOLE = 8; // петля
  TECH_CARD_OPERATION_TYPE_BUTTON_ATTACH = 9; // пришивание пуговиц
  TECH_CARD_OPERATION_TYPE_FUSING = 10; // дублирование / фиксация прокладки
  TECH_CARD_OPERATION_TYPE_HANDWORK = 11; // ручная операция
  TECH_CARD_OPERATION_TYPE_OTHER = 12;
}

// TechCardConstructionZone groups an operation for display only. Construction stays
// a single ordered list; the zone is just a visual band (outer shell, lining, …).
enum TechCardConstructionZone {
  TECH_CARD_CONSTRUCTION_ZONE_UNKNOWN = 0;
  TECH_CARD_CONSTRUCTION_ZONE_OUTER = 1; // верх / основная ткань
  TECH_CARD_CONSTRUCTION_ZONE_LINING = 2; // подклад
  TECH_CARD_CONSTRUCTION_ZONE_INTERLINING = 3; // приклад / дублерин
  TECH_CARD_CONSTRUCTION_ZONE_OTHER = 4;
}

// TechCardOperation is one per-node sewing operation (Sheet «Обработка»).
message TechCardOperation {
  string node = 1; // узел / операция (required)
  string description = 2; // описание обработки
  string seam_type = 3; // тип шва / строчки
  google.type.Decimal stitches_per_cm = 4; // стежков/см
  string topstitch_width = 5; // ширина отстрочки
  string thread = 6; // нитки (арт.)
  string note = 7;
  int32 operation_number = 8; // human operation number (оп. 10, 20, …); 0 = unset
  string machine = 9; // machine / equipment
  string seam_allowance = 10; // seam allowance for this узел
  string needle = 11; // needle size / type
  google.type.Decimal time_norm = 12; // SAM / норма времени, minutes
  string attachment = 13; // folder / binder / guide / hemmer / presser-foot (приспособление)
  TechCardOperationType operation_type = 14; // machine / stitch class; UNKNOWN = unset
  // 0-based index into TechCardInsert.bom_items of the material this operation
  // applies (thread / binding (бейка) / interlining / zipper) when it is NOT resolved
  // through a part. Uses proto3 explicit presence so index 0 (the first BOM line) is
  // distinguishable from "no material": unset = no reference. When set, it wins; the
  // colour resolves via the selected colourway's usage with the same bom_item_index.
  optional int32 bom_item_index = 15;
  int32 callout_number = 16; // links to a TechCardCallout.number (assembly point on the sketch); 0 = none
  TechCardConstructionZone zone = 17; // display-grouping band; UNKNOWN = unset
  string placement = 18; // garment part this operation works on; resolves the real material
  // via the selected colourway's usages (match trim+lower; bom_item_index wins if set)
}

// TechCardIssueSeverity ranks a flagged construction issue.
enum TechCardIssueSeverity {
  TECH_CARD_ISSUE_SEVERITY_UNKNOWN = 0; // defaults to MEDIUM on write
  TECH_CARD_ISSUE_SEVERITY_LOW = 1;
  TECH_CARD_ISSUE_SEVERITY_MEDIUM = 2;
  TECH_CARD_ISSUE_SEVERITY_HIGH = 3;
}

// TechCardIssueStatus is the resolution state of a flagged issue.
enum TechCardIssueStatus {
  TECH_CARD_ISSUE_STATUS_UNKNOWN = 0; // defaults to OPEN on write
  TECH_CARD_ISSUE_STATUS_OPEN = 1;
  TECH_CARD_ISSUE_STATUS_RESOLVED = 2;
  TECH_CARD_ISSUE_STATUS_WONTFIX = 3;
}

// TechCardIssue is a maker-flagged problem ("this seam is impossible") against an
// operation or callout (Sheet «Обработка» / «Тех. эскиз»).
message TechCardIssue {
  int32 operation_number = 1; // the operation it concerns; 0 = none
  int32 callout_number = 2; // the sketch callout it concerns; 0 = none
  string raised_by = 3; // who flagged it (e.g. seamstress)
  TechCardIssueSeverity severity = 4; // UNKNOWN defaults to MEDIUM
  TechCardIssueStatus status = 5; // UNKNOWN defaults to OPEN
  string description = 6; // what is hard / impossible (required)
  string resolution_note = 7;
}

// TechCardLabel is one label / tag spec (Sheet «Этикетки и упаковка»).
message TechCardLabel {
  TechCardLabelType label_type = 1; // required
  string content = 2; // содержание / артикул
  string placement = 3; // размещение
  string attachment = 4; // крепление
  string size = 5; // размер
  string note = 6;
}

// TechCardPackaging holds the packaging spec (Sheet «Этикетки и упаковка»).
message TechCardPackaging {
  string folding_method = 1; // способ складывания
  string polybag = 2; // полибэг (тип / размер)
  string bag_sticker = 3; // стикер на пакет
  string inserts = 4; // доп. вложения
  int32 units_per_box = 5; // кол-во в коробе; 0 = unset
  string box_marking = 6; // маркировка короба
  string box_dimensions = 7; // размеры короба (Д×Ш×В)
  int32 weight_net_grams = 8; // вес нетто, граммы (0 = unset)
  int32 weight_gross_grams = 9; // вес брутто, граммы (0 = unset)
  string notes = 10;
}

// TechCardCostLine is one currency bucket of the materials rollup.
message TechCardCostLine {
  string currency = 1; // empty = usage lines without a currency
  google.type.Decimal amount = 2;
}

// TechCardColorwayCost is the computed cost of ONE colourway (Sheet «Калькуляция»),
// OUTPUT-ONLY (ignored on write). Materials come from that colourway's usages; the manual
// articles (CMT/hardware/…) are shared across colourways, so unit_cost folds them in. All
// figures are per GARMENT except order_cost (whole run). No FX conversion.
message TechCardColorwayCost {
  int32 colorway_index = 1; // 0-based index into TechCardInsert.colorways
  repeated TechCardCostLine materials_total = 2; // per-unit material cost grouped by article currency
  google.type.Decimal materials_per_unit = 6; // Σ per-garment usage cost in costing.currency (and currency-less)
  google.type.Decimal unit_cost = 7; // (materials_per_unit + shared manual articles) × (1 + defect/100), per garment
  int32 order_qty = 8; // Σ size_quantities.order_qty (same whole-run qty for every colourway)
  google.type.Decimal order_cost = 9; // unit_cost × order_qty
  bool has_unconverted_currencies = 5; // a usage currency ≠ costing.currency → excluded from materials_per_unit
  reserved 3, 4; // was materials_cost, size_run_total (superseded by the per-unit / per-order model)
}

// TechCardCosting holds the manually-entered per-unit cost articles (Sheet «Калькуляция»).
// Everything is in a SINGLE currency. The materials line and the unit/order totals are
// COMPUTED on read (output-only, ignored on write). Model: cost is built per GARMENT, then
// scaled to the whole order by order_qty. There is NO pricing here — markup/wholesale/retail
// were removed; pricing lives on the published product.
message TechCardCosting {
  // manual per-unit cost articles (per ONE garment), all in `currency`.
  google.type.Decimal cmt_cost = 1; // пошив / работа (CMT) за 1 изделие
  google.type.Decimal hardware_cost = 2; // фурнитура вне BOM, за 1 изделие
  google.type.Decimal packaging_cost = 3; // упаковка и маркировка, за 1 изделие
  google.type.Decimal logistics_cost = 4; // логистика / доставка, за 1 изделие
  google.type.Decimal overhead_cost = 5; // накладные расходы, за 1 изделие
  google.type.Decimal defect_percent = 6; // брак / запас (%), 0..100
  string currency = 10; // ISO 4217 — the single currency for every article and total
  string notes = 11;

  // OUTPUT-ONLY computed rollup (ignored on write). Root figures are the PRIMARY colourway
  // (colorways index 0); per-colourway figures are in colorway_costs. Materials come from the
  // BOM via each colourway's usages, normalised to a PER-GARMENT figure (a usage graded only
  // per size is divided by order_qty), then taken in the single `currency` — a BOM line in
  // another currency is flagged in has_unconverted_currencies and left out of materials_per_unit
  // (it still appears in materials_total under its own currency, never silently dropped).
  repeated TechCardCostLine materials_total = 12; // per-unit material cost (colourway 0) grouped by article currency
  google.type.Decimal materials_per_unit = 19; // Σ per-garment material cost (colourway 0) in `currency`
  google.type.Decimal unit_cost = 20; // (materials_per_unit + cmt + hardware + packaging + logistics + overhead) × (1 + defect/100)
  int32 order_qty = 21; // Σ size_quantities.order_qty (the whole production run)
  google.type.Decimal order_cost = 22; // unit_cost × order_qty
  bool has_unconverted_currencies = 15; // a material line (colourway 0) is in a currency other than `currency`
  google.type.Decimal total_sam = 16; // Σ operation time_norm (minutes); informative
  repeated TechCardColorwayCost colorway_costs = 18; // OUTPUT-ONLY, per colourway

  // OUTPUT-ONLY base-currency rollup. The unit/order cost of the primary colourway folded into
  // the base currency via the manual costing FX rates. Set ONLY when every currency involved
  // has a rate — this is the figure the product-cost seed uses, so a non-base costing can seed
  // cost_price too. Absent when a needed rate is missing (then has_unconverted_currencies).
  google.type.Decimal unit_cost_base = 23; // unit_cost converted to base_currency
  google.type.Decimal order_cost_base = 24; // unit_cost_base × order_qty
  string base_currency = 25; // the base currency the *_base figures are in

  reserved 7, 8, 9; // pricing removed (markup_multiplier, wholesale_price, retail_price — moved to product)
  reserved 13, 14, 17; // was materials_cost, total_cost, labour_cost (superseded / removed)
}

// TechCardInsert is the writable payload for a tech card. Nested lists are full
// replacements on update (like ColorwayNew).
// TechCardSignoffSection is the sheet a sign-off covers.
enum TechCardSignoffSection {
  TECH_CARD_SIGNOFF_SECTION_UNKNOWN = 0;
  TECH_CARD_SIGNOFF_SECTION_DESIGN = 1;
  TECH_CARD_SIGNOFF_SECTION_CONSTRUCTION = 2;
  reserved 3; // was TECH_CARD_SIGNOFF_SECTION_POM (POM removed)
  TECH_CARD_SIGNOFF_SECTION_MATERIALS = 4;
  TECH_CARD_SIGNOFF_SECTION_COLOUR = 5;
  TECH_CARD_SIGNOFF_SECTION_LABELS = 6;
  TECH_CARD_SIGNOFF_SECTION_PACKAGING = 7;
  TECH_CARD_SIGNOFF_SECTION_COSTING = 8;
}

// TechCardSignoffState is the sign-off decision for a section.
enum TechCardSignoffState {
  TECH_CARD_SIGNOFF_STATE_UNKNOWN = 0; // defaults to PENDING on write
  TECH_CARD_SIGNOFF_STATE_PENDING = 1;
  TECH_CARD_SIGNOFF_STATE_APPROVED = 2;
  TECH_CARD_SIGNOFF_STATE_REJECTED = 3;
}

// TechCardSignoff records one responsible role's sign-off of a sheet, so the
// header approval_state isn't the only gate (Sheet «Титул» coordination).
message TechCardSignoff {
  TechCardSignoffSection section = 1; // required; unique per card
  TechCardSignoffState state = 2; // UNKNOWN defaults to PENDING
  string signed_by = 3; // who signed (free text / role name)
  google.protobuf.Timestamp signed_at = 4;
  string note = 5;
}

// TechCardPieceColorwayMaterial maps ONE cut-piece to its fabric (and optional fusing) for ONE
// colourway. colorway_index is positional into TechCardInsert.colorways (full-replace recreates
// colourway ids, so the link is by position — mirrors bom_item_index / operation refs). The BOM
// refs are positional into TechCardInsert.bom_items.
message TechCardPieceColorwayMaterial {
  int32 colorway_index = 1; // 0-based index into TechCardInsert.colorways
  optional int32 bom_item_index = 2; // 0-based index into TechCardInsert.bom_items (the fabric)
  optional int32 fusing_bom_item_index = 3; // 0-based index into bom_items (the fusing / клеевая), if any
  string note = 4;
}

// TechCardPiece is one structural cut-piece of the garment (полочка, спинка, обтачка горловины…):
// how many per garment, whether mirrored/paired, its grainline (долевая) and whether it is fused
// (клеевая). materials picks, per colourway, which BOM fabric it is cut from. Full-replace child.
message TechCardPiece {
  string name = 1; // «полочка», «спинка», «обтачка горловины»…
  int32 pieces_per_garment = 2; // how many times cut per garment (default 1)
  bool mirrored = 3; // paired / mirror piece
  string grainline = 4; // долевая: lengthwise|crosswise|bias|any
  bool fused = 5; // клеевая (fused with interlining)
  optional int32 callout_number = 6; // link to a sketch callout pin (like operations)
  string note = 7;
  repeated TechCardPieceColorwayMaterial materials = 8; // per-colourway fabric mapping
}

// SkuSeason is the normalized style-owned season used in every SKU. The pair is atomic: callers
// either omit the whole message (early draft/idea) or provide both a known code and a 2000..2099
// year. Free-text season labels are not part of the contract.
message SkuSeason {
  SeasonEnum code = 1;
  int32 year = 2;
}

message TechCardInsert {
  // identification (Sheet «Титул»)
  // Артикул. Required from the PROTO stage onward; OPTIONAL (empty) while stage == IDEA — an idea
  // is by definition pre-article (NF-03/B-2). Moving a card out of IDEA without a real style
  // number is rejected with InvalidArgument.
  string style_number = 1;
  string name = 2; // Название изделия (required)
  string brand = 3;
  reserved 4;
  reserved "season";
  string collection = 5;
  int32 category_id = 6; // FK category(id); 0 = unset
  GenderEnum target_gender = 7; // UNKNOWN = unset
  TechCardStage stage = 8; // UNKNOWN defaults to PROTO
  string status = 9; // freeform workflow notes (soft, non-gating)
  TechCardApprovalState approval_state = 35; // UNKNOWN defaults to DRAFT
  string approved_by = 36; // who approved the current revision
  google.protobuf.Timestamp released_at = 37; // when released to manufacture
  TechCardMeasurementUnit measurement_unit = 38; // UNKNOWN defaults to MM
  string version = 10;
  google.protobuf.Timestamp revision_date = 11;
  int32 base_model_id = 12; // FK model(id); 0 = unset
  int32 base_sample_size_id = 13; // FK size(id); 0 = unset
  string designer = 14;
  string constructor = 15;
  string technologist = 16;

  // construction description (lower block of Sheet «Титул») now lives in details[]; the
  // header targets / currency were removed (pricing is on costing, single brand policy).
  string notes = 29;

  // children (full-replace on update)
  repeated int32 size_ids = 30; // size range / grade (FK size(id))
  repeated int32 product_ids = 31; // linked catalog products (FK product(id)); the CANON product↔style link every consumer reads (cost seed, GetMarginByStyle). Colourway product_ids are auto-unioned in on save
  // Sketch media split into two INDEPENDENT lists (replaces the single `media = 32`):
  //   moodboard_media — mood / inspiration / reference / fabric-swatch photos (design intent)
  //   technical_media — flat sketches used in construction (front / back / detail / lining / preview)
  // Construction consumes ONLY technical_media. Each item's `kind` sub-classifies within its
  // list. Both are full-replace on update. A callout pins onto ANY media_id on the card — moodboard
  // OR technical (the backend does not restrict the category), so at the idea stage a callout can pin
  // onto a moodboard/reference image before any technical sketch exists.
  repeated TechCardMediaItem moodboard_media = 55;
  repeated TechCardMediaItem technical_media = 56;
  repeated TechCardCallout callouts = 33; // sketch callouts (pin onto any moodboard or technical media by media_id)
  repeated TechCardRevision revisions = 34; // revision log

  // materials (Phase 2): bill of materials (article catalog) and colourways (recipes).
  // CONTRACT (nf05-01): downstream references into bom_items and colorways are POSITIONAL, by index,
  // and every write is a full replace (there are no stable ids to reference across a save). So when a
  // BOM line or colourway is removed or reordered, the client MUST renumber all downstream indices in
  // the SAME payload — colorway usages' bom_item_index, operations' bom_item_index, and pieces'
  // colorway_index / bom_item_index / fusing_bom_item_index. An index left pointing at a shifted row
  // silently maps a detail to the wrong material/colourway (data that goes to the factory); an
  // out-of-range index is rejected, but an in-range-but-wrong one is not. The server range-checks but
  // cannot detect a wrong-but-valid index.
  repeated TechCardBomItem bom_items = 40;
  repeated TechCardColorway colorways = 41;

  // production (Phase 3): construction, operations, labels, packaging, costing.
  TechCardConstruction construction = 43; // 1:1; null = unset
  repeated TechCardOperation operations = 44;
  repeated TechCardLabel labels = 45;
  TechCardPackaging packaging = 46; // 1:1; null = unset
  TechCardCosting costing = 47; // 1:1; null = unset

  // hardening (Phase 3.5a)
  google.protobuf.Timestamp approved_at = 48; // auto-set on approve/release if unset
  string concept = 49; // design concept / intent (designer)
  repeated TechCardIssue issues = 50; // maker-flagged construction issues
  repeated TechCardSizeQuantity size_quantities = 51; // per-size order quantity (size run)
  repeated TechCardSignoff signoffs = 52; // per-section sign-off
  repeated TechCardSizePattern patterns = 53; // per-size PDF выкройки (cut patterns)

  // construction-description aspects with reference images (replaces the flat strings).
  repeated TechCardDetail details = 54;

  // structural cut-pieces (детали кроя) + per-colourway fabric mapping (NF-05). Full-replace.
  repeated TechCardPiece pieces = 100;

  // NF-07 auxiliary items. purpose is "sellable" (default/empty) or "auxiliary"; an auxiliary card
  // produces a packaging material rather than a product, so it may not link products and its run
  // output receipts into output_material_id (required before the first run; 0 = unset).
  TechCardPurpose purpose = 101; // R6: type change string→enum on the same wire number

  int32 output_material_id = 102;
  SkuSeason sku_season = 103; // optional as a whole; required before a styled product can mint SKU

  // Reserved so a future field can never collide with a removed one. 17-19 targets+currency;
  // 20-28 construction-desc strings → details[]; 32 was the single `media` list (split into
  // moodboard_media/technical_media); 42 pom_points; 39 prior.
  reserved 17 to 28, 32, 39, 42, 57 to 99;
}

// TechCard is a stored tech card with resolved sketch media.
message TechCard {
  int32 id = 1;
  TechCardInsert tech_card = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  int32 lock_version = 6; // optimistic-lock token; echo into UpdateTechCardRequest.expected_lock_version
  // Resolved sketch media (MediaFull), split to mirror the writable lists.
  repeated TechCardMediaFull resolved_moodboard_media = 7;
  repeated TechCardMediaFull resolved_technical_media = 8;
  reserved 5; // was resolved_media (single combined list; now split)
}

// TechCardListItem is a lightweight tech-card header for list views.
message TechCardListItem {
  int32 id = 1;
  string style_number = 2;
  string name = 3;
  string brand = 4;
  TechCardStage stage = 5;
  string status = 6;
  GenderEnum target_gender = 7;
  reserved 8;
  reserved "season";
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  TechCardApprovalState approval_state = 11;
  int32 lock_version = 12; // optimistic-lock token, so a list→edit needs no extra GET
  // Thumbnail URL for a grid/gallery view (idea gallery). For an IDEA card it is the first
  // moodboard image; otherwise the PREVIEW-kind sketch (falling back to the first technical, then any
  // media). Empty when the card has no media. Resolved server-side to avoid an N+1 GetTechCard.
  string preview_url = 13;
  // Card purpose: "sellable" (default) or "auxiliary" (NF-07). Lets a board/list badge auxiliary
  // cards (dust bags, shoppers…) without an N+1 GetTechCard, mirroring TechCard.purpose.
  TechCardPurpose purpose = 14; // R6: type change string→enum on the same wire number
  SkuSeason sku_season = 15;
}
