syntax = "proto3";

package common;

import "google/protobuf/timestamp.proto";
import "google/type/decimal.proto";

option go_package = "github.com/jekabolt/grbpwr-manager/proto/gen/common;common";

enum ShippingRegion {
  SHIPPING_REGION_UNKNOWN = 0;
  SHIPPING_REGION_AFRICA = 1;
  SHIPPING_REGION_AMERICAS = 2;
  SHIPPING_REGION_ASIA_PACIFIC = 3;
  SHIPPING_REGION_EUROPE = 4;
  SHIPPING_REGION_MIDDLE_EAST = 5;
}

message ShipmentCarrierPrice {
  string currency = 1;
  google.type.Decimal price = 2;
}

message ShipmentCarrierInsert {
  string carrier = 1;
  bool allowed = 2;
  string description = 3;
  string tracking_url = 4;
  string expected_delivery_time = 5;
  // aftership_slug is the AfterShip courier slug used to auto-track this carrier's shipments.
  // Empty = the carrier has no tracking API, so its orders are auto-delivered only by the timer.
  string aftership_slug = 6;
  // auto_deliver_after_hours is the timer safety-net window: hours after shipment to silently mark
  // an order delivered when no real delivery signal arrived. 0 = use the server default (14 days).
  int32 auto_deliver_after_hours = 7;
}

message ShipmentCarrier {
  int32 id = 1;
  ShipmentCarrierInsert shipment_carrier = 2;
  repeated ShipmentCarrierPrice prices = 3; // Multi-currency prices
  repeated ShippingRegion allowed_regions = 4; // empty = global
}

// Shipment represents the shipment table
message Shipment {
  google.type.Decimal cost = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  int32 carrier_id = 4;
  string tracking_code = 5;
  google.protobuf.Timestamp shipping_date = 6;
  google.protobuf.Timestamp estimated_arrival_date = 7;
  bool free_shipping = 8; // True when shipping was complimentary (threshold met or promo)
  // actual_cost is the real carrier invoice for this shipment (EUR), distinct from cost
  // (the price charged to the customer). NULL until an operator enters it.
  google.type.Decimal actual_cost = 9;
  // return_shipping_cost is the reverse-logistics cost of a return (EUR), NULL when the
  // order was not returned.
  google.type.Decimal return_shipping_cost = 10;
}
