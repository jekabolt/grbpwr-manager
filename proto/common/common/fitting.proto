syntax = "proto3";

package common;

import "common/media.proto";
import "google/protobuf/timestamp.proto";
import "google/type/decimal.proto";

option go_package = "github.com/jekabolt/grbpwr-manager/proto/gen/common;common";

// FittingStatus is the lifecycle state of a fitting session.
enum FittingStatus {
  FITTING_STATUS_UNKNOWN = 0;
  FITTING_STATUS_PLANNED = 1;
  FITTING_STATUS_DONE = 2;
  FITTING_STATUS_CANCELLED = 3;
}

// FittingVerdict is the outcome of a fitting session.
enum FittingVerdict {
  FITTING_VERDICT_UNKNOWN = 0;
  FITTING_VERDICT_PENDING = 1;
  FITTING_VERDICT_APPROVED = 2;
  FITTING_VERDICT_NEEDS_REWORK = 3;
  FITTING_VERDICT_REJECTED = 4;
}

// FittingSizeInsert is one size tried in a fitting, with an optional per-size note.
message FittingSizeInsert {
  int32 size_id = 1;
  string fit_note = 2;
}

// FittingInsert is the writable payload for a fitting session. A fitting anchors
// to a tech card (the style) and/or a specific product (the colour/SKU sample);
// at least one of tech_card_id / product_id must be set.
message FittingInsert {
  int32 product_id = 1; // FK product(id); 0 = unset (the specific colour/SKU sample)
  int32 model_id = 2; // FK model(id); 0 = unspecified
  google.protobuf.Timestamp fitting_date = 3;
  string comment = 4;
  FittingStatus status = 5;
  FittingVerdict verdict = 6;
  string recorded_by = 7 [deprecated = true]; // DEPRECATED (§2.7): the recorder is now the server-stamped created_by; ignored on write
  repeated FittingSizeInsert sizes = 8;
  repeated int32 media_ids = 9;
  int32 tech_card_id = 10; // FK tech_card(id); 0 = unset (the style being fitted)
  // PDF выкройки measured in this fitting. The tech card holds the FINAL pattern per
  // size; a fitting captures the ITERATION that was actually tried on (so you know which
  // pattern you measured). A fitting may carry several (it can span sizes). Each PDF is
  // uploaded via Admin.UploadPattern; the url is stored as a snapshot (immune to later
  // tech-card edits).
  repeated FittingPattern patterns = 11;
  // Callouts pinned onto the fitting's photos — a marker + note flagging what is
  // wrong with the fit at a point on a specific photo (media_ids). Full-replace on
  // update, like sizes/media/patterns.
  repeated FittingCallout callouts = 12;
  // This fitting's number in the tech card's try-on sequence (task 13). 0 = unset: the
  // server auto-assigns the next number (max+1) per tech card on create when the fitting is
  // anchored to a card. A non-zero value is honoured (manual override); unique per card.
  int32 round_number = 13;
  // Structured round outcome (distinct from the free verdict): approved | new_round | dropped.
  // "" = undecided.
  string outcome = 14;
  // The structured "what to change" work list produced by this fitting. Full-replace on update,
  // like callouts; resolved is toggled when a change is carried into the tech card.
  repeated FittingChangeRequest change_requests = 15;
  int32 sample_id = 16; // 0 = unset; the sample this fitting tried on (new-flow NF-04)
}

// FittingChangeRequest is one structured remark item produced by a fitting (S26, §2.7). target is the
// change CATEGORY; zone + piece_id are the structured LOCATION (which replace the front's misuse of
// target as a free "sleeve/collar" field, A2). status (open|resolved) replaces the old boolean
// resolved; carried_from_id links this item to the one in the PREVIOUS round it continues, giving a
// visible carry-over history (acceptance E.15). The free fitting.comment stays a separate free note.
message FittingChangeRequest {
  int32 id = 1; // output-only, assigned on save
  string target = 2; // change category: pattern | construction | material | grading | other (required)
  string note = 3; // what to change (required)
  int32 callout_number = 4; // optional link to a fitting_callout pin (0 = none)
  bool resolved = 5 [deprecated = true]; // DEPRECATED (S26): replaced by status; read-only mirror of status=="resolved"
  string zone = 6; // WHERE on the garment: tech_card_operation.zone dictionary (unknown|outer|lining|interlining|other); "" = unspecified
  int32 piece_id = 7; // FK tech_card_piece(id): which piece; 0 = unset
  string status = 8; // open | resolved (defaults to open)
  int32 carried_from_id = 9; // FK fitting_change_request(id): the prior-round item this continues; 0 = none
  string created_by = 10; // audit: acting admin username (server-stamped, output)
  int32 fitting_id = 11; // owning fitting (output; set on the carry-over list)
  int32 round_number = 12; // the development round this item belongs to (output; derived from the sample)
}

// FittingChangeRequestInsert is the write payload for the dedicated change-request CRUD (S26). Unlike
// the embedded initial batch on FittingInsert, these items are managed individually so their id is
// STABLE — which carried_from_id (and the resolve/carry-over flow) depends on. created_by is stamped
// server-side.
message FittingChangeRequestInsert {
  int32 fitting_id = 1; // required on add; the fitting this item belongs to
  string target = 2; // change category (required): pattern | construction | material | grading | other
  string note = 3; // what to change (required)
  int32 callout_number = 4; // optional link to a fitting_callout pin (0 = none)
  string zone = 5; // optional: tech_card_operation.zone dictionary ("" = unspecified)
  int32 piece_id = 6; // optional FK tech_card_piece(id) (0 = unset)
  string status = 7; // open | resolved ("" defaults to open)
  int32 carried_from_id = 8; // optional FK to the prior-round item this continues (0 = none)
}

// FittingCallout is a numbered marker pinned to a fitting photo, noting a fit
// problem at a point on the image ("here the shoulder is too tight"). It is the
// fitting analogue of TechCardCallout but deliberately simpler: a pin + a note,
// with no part/dimensions (a fitting flags posadka, not spec geometry).
message FittingCallout {
  int32 number = 1; // marker number shown on the photo
  string note = 2; // what is wrong with the fit here (required)
  int32 media_id = 3; // FK media(id); the fitting photo this callout is pinned to (0 = unanchored)
  google.type.Decimal pos_x = 4; // normalised x (0..1) of the marker on its photo
  google.type.Decimal pos_y = 5; // normalised y (0..1) of the marker on its photo
}

// FittingPattern is one PDF выкройка iteration tried in a fitting (snapshot of the
// uploaded file, not a live reference to a tech-card pattern).
message FittingPattern {
  int32 size_id = 1; // FK size(id); 0 = unset (which size this pattern is for)
  string url = 2; // CDN url of the uploaded PDF (required)
  string filename = 3; // original filename, for display / download
  int64 size_bytes = 4; // file size in bytes (0 = unknown)
}

// Fitting is a stored try-on session with resolved media for display.
message Fitting {
  int32 id = 1;
  FittingInsert fitting = 2;
  repeated MediaFull media = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  int32 lock_version = 6; // optimistic-lock token (§2.12/S25); echo back on UpdateFitting.expected_lock_version
  string created_by = 7; // audit: acting admin username, server-stamped once on create
  string updated_by = 8; // audit: acting admin username, server-stamped on every write
}
