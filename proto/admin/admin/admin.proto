// --- Analytics: Sell-through by Drop ---

// SellThroughByDropRow aggregates a release/drop cohort (product.collection) into
// decision-grade totals, so tiny per-day/per-SKU samples roll up to a statistically
// meaningful drop-level view. sell_through_pct = units_sold / (units_sold +
// units_remaining) × 100 over the whole drop, computed lifetime (current state), not
// windowed — sell-through is inherently cumulative. Sorted by revenue desc.
message SellThroughByDropRow {
  string collection = 1; // the drop identifier (product.collection)
  int32 product_count = 2; // distinct products in the drop
  int64 units_sold = 3; // lifetime net units sold across the drop
  int64 units_remaining = 4; // current on-hand units across the drop
  double sell_through_pct = 5; // units_sold / (units_sold + units_remaining) × 100
  google.type.Decimal revenue = 6; // lifetime net revenue (base currency) for the drop
  int64 units_bought = 7; // initial-stock proxy: units_sold + units_remaining
  google.type.Decimal gross_margin = 8; // costed-subset gross margin (base ccy): Σ over the drop's costed products of (revenue − cost_price×units_sold). Meaningful only when has_cost.
  double gross_margin_pct = 9; // gross_margin / costed_revenue × 100
  bool has_cost = 10; // at least one product in the drop has a cost_price (else gross_margin is N/A, not 0)
  optional int64 days_to_50pct = 11; // days from the drop's first sale to 50% sell-through; unset when the drop hasn't reached 50% yet
}

// --- Analytics: Size Run Efficiency ---

message SizeRunEfficiencyRow {
  int32 product_id = 1;
  string product_name = 2;
  int32 total_sizes = 3;
  int32 sold_through_sizes = 4; // Count of sizes with any sales activity (>0 units sold)
  double efficiency_pct = 5; // size-run coverage: (sold_through_sizes / total_sizes) * 100
  int64 units_bought = 6; // Σ initial stock across sizes (current on-hand + net units sold)
  int64 units_sold = 7; // Σ net units sold across sizes
  double sell_through_pct = 8; // true unit sell-through: units_sold / units_bought * 100 (distinct from the size-coverage efficiency_pct)
}

// --- Analytics: Slow Movers ---

message SlowMoverRow {
  int32 product_id = 1;
  string product_name = 2;
  google.type.Decimal revenue = 3;
  int64 units_sold = 4;
  double days_in_stock = 5;
  google.protobuf.Timestamp last_sale_date = 6;
  bool product_hidden = 7; // Product visibility flag (from product.hidden)
  int64 total_views = 8; // GA4 page views for period (from ga4_product_page_metrics)
  // Margin fields (mirror ProductMetric). Populated only when the product has a cost_price;
  // has_cost=false ⇒ the cost is unknown, so treat margins as N/A, not as 100%. Computed on
  // this row's `revenue` (the refund/FX/discount-adjusted net revenue), so revenue_cost is the
  // refund-adjusted COGS — the same basis as the BusinessMetrics and product-breakdown margins.
  google.type.Decimal unit_cost = 9; // current per-unit COGS (base currency)
  google.type.Decimal revenue_cost = 10; // Σ(cost × net qty), refund-adjusted
  google.type.Decimal gross_margin = 11; // revenue − revenue_cost
  double gross_margin_pct = 12; // gross_margin / revenue × 100
  bool has_cost = 13;
}

// --- Analytics: Margin by Style (task 15) ---

// MarginByStyleRow rolls the per-SKU margin breakdown up to the STYLE (tech card) a product's
// primary_tech_card_id points at, so a style with several colourway SKUs is ONE row instead of
// many. tech_card_id = 0 is the "no style" bucket (products without a primary card). Revenue
// and COGS use the same order_factors apportionment as the product breakdowns; margins are N/A
// (has_cost=false) when the sold SKUs carry no cost.
message MarginByStyleRow {
  int32 tech_card_id = 1; // 0 = products with no primary style
  string style_number = 2;
  string name = 3;
  google.type.Decimal revenue = 4; // net revenue (refund/FX/discount/VAT-adjusted)
  int64 units_sold = 5;
  int32 colorway_count = 6; // distinct products (SKUs) that sold under this style
  google.type.Decimal unit_cost = 7; // representative per-unit COGS (MAX over the style's SKUs)
  google.type.Decimal revenue_cost = 8; // Σ(cost × net qty), refund-adjusted
  google.type.Decimal gross_margin = 9; // revenue − revenue_cost
  double gross_margin_pct = 10; // gross_margin / revenue × 100
  bool has_cost = 11;
}

// StyleProductionSummary aggregates the plan-vs-fact of a style's production runs (task 09) into
// one overview. planned_cost_base is Σ(planned_unit_cost × planned_qty) over the runs; actual is
// the Σ of recorded actual cost articles. A style with no runs is all-zero (has_actuals=false).
message StyleProductionSummary {
  int32 runs = 1; // production runs recorded for the style
  int32 planned_qty_total = 2; // Σ planned units across runs
  int32 received_qty_total = 3; // Σ received units across runs
  google.type.Decimal planned_cost_base = 4; // Σ planned_unit_cost × planned_qty (base ccy)
  google.type.Decimal actual_cost_base = 5; // Σ recorded actual production costs (base ccy)
  google.type.Decimal cost_variance = 6; // actual_cost_base − planned_cost_base (base ccy)
  bool has_actuals = 7; // at least one run has recorded actual costs
  google.type.Decimal materials_from_stock_base = 8; // net warehouse material issued into the style's runs, base EUR (NF-09)
}

// StyleEconomics is the "style as a business case" card (task 15 part C): one tech card's lifetime
// sales tied to the money spent developing and producing it. Cost/margin fields (sales.*_cost /
// *_margin, dev_cost, production costs, net_after_dev) are stripped without costing:read.
message StyleEconomics {
  int32 tech_card_id = 1;
  string style_number = 2;
  string name = 3;
  MarginByStyleRow sales = 4; // lifetime sales margin over all the style's colourway SKUs
  common.TechCardDevCostSummary dev_cost = 5; // R&D development-cost journal roll-up (task 14)
  int32 fitting_rounds = 6; // number of fitting rounds recorded for the style (task 13)
  StyleProductionSummary production = 7; // plan/fact across the style's production runs (task 09)
  // net_after_dev = sales.gross_margin − dev_cost.total_base. A contribution-style figure (dev is a
  // period R&D cost NOT folded into unit COGS), NOT net profit. Unset when the style has no cost.
  google.type.Decimal net_after_dev = 8;
  string caveat = 9; // e.g. no product cost, or dev cost has unconverted currency
  int32 samples_count = 10; // number of samples made for the style (NF-09)
  google.type.Decimal samples_cost_base = 11; // warehouse material the samples consumed, base EUR — informational, NOT in net_after_dev (NF-09)
}

message GetStyleEconomicsRequest {
  int32 tech_card_id = 1;
}

message GetStyleEconomicsResponse {
  StyleEconomics economics = 1;
}

// ChannelSettledRoasRow is one marketing channel's settled-revenue economics over a period (task 20
// step 2): settled base revenue attributed to the channel via server-side last-non-direct click,
// order and first-time-customer counts, and — when operator spend exists for the channel — spend,
// ROAS (settled_revenue / spend) and CAC (spend / new_customers).
message ChannelSettledRoasRow {
  string utm_source = 1;
  string utm_medium = 2;
  string utm_campaign = 3;
  google.type.Decimal settled_revenue = 4; // base-currency settled revenue attributed to the channel
  int64 orders = 5;
  int64 new_customers = 6; // distinct first-time customers acquired via the channel in the period
  google.type.Decimal spend = 7; // operator-entered channel_spend (base ccy); unset when none
  double roas = 8; // settled_revenue / spend; 0 when spend is absent
  double cac = 9; // spend / new_customers; 0 when spend absent or no new customers
  bool has_spend = 10; // whether channel_spend was found for this channel (else roas/cac are N/A)
}

message GetChannelRoasSettledRequest {
  string period = 1; // e.g. 7d, 30d, 90d, today, WTD, MTD, QTD, YTD (same grammar as GetDashboard)
  google.protobuf.Timestamp end_at = 2;
}

message GetChannelRoasSettledResponse {
  repeated ChannelSettledRoasRow rows = 1;
  string base_currency = 2;
}

// --- Analytics: COGS structure (task 15) ---

// CogsStructureRow is one component of the cost of goods SOLD in the period, attributed from
// each product's cost_breakdown snapshot. The actual line COGS is split by the breakdown's
// component proportions, so components sum to the reported COGS; sold units with no breakdown
// (manual cost / pre-feature) collect in the "unattributed" component so coverage is visible.
message CogsStructureRow {
  string component = 1; // materials|cmt|hardware|packaging|logistics|overhead|unattributed
  google.type.Decimal amount = 2; // base-currency (EUR) Σ over the period, refund-adjusted
  double pct = 3; // share of total COGS
}

// --- Analytics: Inventory valuation (task 16) ---

// InventoryValuationRow is one product's frozen stock value: on-hand units × current per-unit
// cost. sold_units is the product's net units sold in the window (0 ⇒ dead stock).
message InventoryValuationRow {
  int32 product_id = 1;
  string product_name = 2;
  int64 on_hand = 3;
  google.type.Decimal unit_cost = 4; // current plan cost_price (base currency)
  google.type.Decimal value = 5; // on_hand × unit_cost
  int64 sold_units = 6; // net units sold in the window (0 = dead stock)
}

// InventoryValuation is the money view of the warehouse: cost frozen in stock, how much is dead
// (unsold in the window), and damage/loss write-offs in the period. Stock is valued at the
// current plan cost_price (v1); products without a cost are counted as uncosted (value unknown),
// never as zero, so coverage is honest.
message InventoryValuation {
  google.type.Decimal total_stock_value = 1; // Σ cost_price × on_hand over costed products, base EUR
  int64 total_on_hand_units = 2; // Σ on_hand over all in-stock products
  int64 costed_on_hand_units = 3; // on_hand of products that have a cost
  int64 uncosted_stock_units = 4; // on_hand of products with no cost (value unknown)
  int32 uncosted_stock_products = 5; // distinct in-stock products with no cost
  double coverage_pct = 6; // costed_on_hand_units / total_on_hand_units × 100
  repeated InventoryValuationRow top_by_value = 7; // costed products ranked by frozen value
  repeated InventoryValuationRow dead_stock = 8; // costed, in-stock, unsold in window — by value
  google.type.Decimal write_offs_value = 9; // Σ |Δqty| × cost_price for damage/loss in the period
  int64 write_offs_units = 10; // units written off (damage/loss) in the period
  // Raw-material warehouse (NF-09). Materials valued at moving-average unit cost, base EUR.
  google.type.Decimal raw_materials_value = 11; // Σ on_hand × avg_unit_cost_base over costed materials with stock
  int32 raw_materials_count = 12; // materials with on_hand > 0
  int32 raw_uncosted_count = 13; // materials with stock but no average (value unknown)
  google.type.Decimal wip_value = 14; // work-in-progress: materials issued into OPEN runs and not returned
  google.type.Decimal writeoffs_materials_value = 15; // material write-offs (damage/loss/defect) in the period
  repeated MaterialValuationRow top_materials_by_value = 16; // costed in-stock materials ranked by frozen value
}

// MaterialValuationRow is one raw-material line in the warehouse money view (NF-09).
message MaterialValuationRow {
  int32 material_id = 1;
  string name = 2;
  string unit = 3;
  google.type.Decimal on_hand = 4;
  google.type.Decimal avg_unit_cost_base = 5; // moving-average unit cost, base EUR
  google.type.Decimal value = 6; // on_hand × avg_unit_cost_base
}

