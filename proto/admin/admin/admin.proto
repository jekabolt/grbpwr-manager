  google.type.Decimal p90 = 3;
  int32 sample_size = 4;
}

message TimeSeriesPoint {
  google.protobuf.Timestamp date = 1;
  google.type.Decimal value = 2;
  int32 count = 3;
}

message ProductViewMetric {
  int32 product_id = 1;
  string product_name = 2;
  string brand = 3;
  int32 page_views = 4;
  int32 sessions = 5;
  int32 add_to_carts = 6;
