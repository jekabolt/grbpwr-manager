// OpexLineInsert is one operating-expense line item (NF-08). Amount is in `currency`; it is folded
// to the base currency server-side via the manual costing FX rates (left uncosted, and excluded
// from the operating result, when the currency has no rate).
message OpexLineInsert {
  string month = 1; // target month, YYYY-MM (a YYYY-MM-DD date in the month is also accepted); normalised to the first of the month
  string category = 2; // salaries | rent | software | marketing_other | production_content | other | taxes | bank_fees | professional_services | logistics_office
  string label = 3; // free text distinguishing lines within a month × category (e.g. «Adobe CC», «швея Мария»)
  google.type.Decimal amount = 4; // in `currency`, >= 0
  string currency = 5; // ISO 4217; defaults to the base currency when empty
  string note = 6;
}

// OpexLine is a stored OPEX line item.
message OpexLine {
  int32 id = 1;
  string month = 2;
  string category = 3;
  string label = 4;
  google.type.Decimal amount = 5; // in `currency`
  string currency = 6;
  google.type.Decimal amount_base = 7; // base currency; zero when uncosted (see `costed`)
  bool costed = 8; // false = the currency had no FX rate for the month; excluded from the operating result
  int32 recurring_id = 9; // 0 = manual line; else the recurring template it was materialised from
  string note = 10;
}

message UpsertOpexLinesRequest {
  repeated OpexLineInsert lines = 1;
}

message UpsertOpexLinesResponse {}

message DeleteOpexLineRequest {
  int32 id = 1;
}

message DeleteOpexLineResponse {}

message ListOpexLinesRequest {
  string month_from = 1; // inclusive, any date in the month, YYYY-MM-DD
  string month_to = 2; // inclusive
  string category = 3; // empty = any
}

message ListOpexLinesResponse {
  repeated OpexLine lines = 1;
}

// OpexRecurringInsert is a recurring fixed-cost template (salary, subscription, rent) that a worker
// materialises into a monthly OpexLine from active_from to min(current month, active_to).
message OpexRecurringInsert {
  string label = 1;
  string category = 2;
  google.type.Decimal amount = 3; // in `currency`, >= 0
  string currency = 4; // ISO 4217; defaults to the base currency when empty
  string active_from = 5; // any date in the first active month, YYYY-MM-DD; normalised to the 1st
  string active_to = 6; // empty = open-ended; else any date in the last active month
  string note = 7;
  int32 employee_id = 8; // salary link to the employee registry (gap-07 v2 A); 0 = not a per-person salary
}

// OpexRecurring is a stored recurring OPEX template.
message OpexRecurring {
  int32 id = 1;
  OpexRecurringInsert recurring = 2;
  bool archived = 3;
}

message UpsertOpexRecurringRequest {
  OpexRecurringInsert recurring = 1;
  int32 id = 2; // 0 = insert a new template; else update the template with this id
}

message UpsertOpexRecurringResponse {
  int32 id = 1;
}

message ArchiveOpexRecurringRequest {
  int32 id = 1;
}

message ArchiveOpexRecurringResponse {}

message ListOpexRecurringRequest {
  bool include_archived = 1;
}

message ListOpexRecurringResponse {
  repeated OpexRecurring recurring = 1;
}

// EmployeeInsert is a person in the salary registry (gap-07 v2 A): identity + employment window + an
// informational default monthly cost. The booked cost stays in the OPEX journal (an OpexRecurring
// template with employee_id set); default_monthly_cost only pre-fills that template, it is never a
// cost figure in any report.
message EmployeeInsert {
  string full_name = 1;
  string role = 2; // free-text title (швея / конструктор / …)
  string employment_start = 3; // YYYY-MM-DD, optional
  string employment_end = 4; // YYYY-MM-DD, optional; empty = still employed
  string default_currency = 5; // ISO 4217, optional
  google.type.Decimal default_monthly_cost = 6; // informational default gross monthly cost, >= 0
  string note = 7;
}

// Employee is a stored registry row.
