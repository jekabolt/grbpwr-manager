// ACCOUNTING (double-entry ledger, docs/plan-accounting/). The ledger is a DERIVED, append-only
// projection of operational facts (orders, material movements, production runs, opex) plus manual
// entries; base currency EUR. Dates are plain YYYY-MM-DD strings throughout (never
// google.protobuf.Timestamp — 05-admin-api.md's date convention); money is google.type.Decimal.

// --- chart of accounts ---

// AcctAccount is a stored chart-of-accounts row. is_system accounts participate in automated
// posting rules and cannot be renamed or archived (ErrAcctSystemAccount).
message AcctAccount {
  int32 id = 1;
  string code = 2;
  string name = 3;
  string section = 4; // asset | liability | equity | revenue | cogs | opex
  string statement = 5; // BS | PL
  bool is_system = 6;
  bool archived = 7;
}

message ListAcctAccountsRequest {
  bool include_archived = 1;
}

message ListAcctAccountsResponse {
  repeated AcctAccount accounts = 1;
}

message CreateAcctAccountRequest {
  string code = 1;
  string name = 2;
  string section = 3; // asset | liability | equity | revenue | cogs | opex
  string statement = 4; // BS | PL
}

message CreateAcctAccountResponse {
  AcctAccount account = 1;
}

message UpdateAcctAccountRequest {
  string code = 1;
  string name = 2;
}

message UpdateAcctAccountResponse {
  AcctAccount account = 1;
}

message ArchiveAcctAccountRequest {
  string code = 1;
  bool archived = 2;
}

message ArchiveAcctAccountResponse {}

// --- journal ---

// AcctJournalLineInput is one side of a manual journal entry being posted. Either `amount` (base
// currency, EUR) or `amount_src`+`currency_src` (converted to base server-side via the costing FX
// rates) must be set — never both, never neither.
message AcctJournalLineInput {
  string account_code = 1;
  bool is_debit = 2;
  google.type.Decimal amount = 3; // EUR; either this or amount_src+currency_src
  google.type.Decimal amount_src = 4; // amount in currency_src; server converts to EUR
  string currency_src = 5; // ISO 4217, or USDT (internal/currency.IsExpenseCurrency)
  string note = 6;
}

message CreateJournalEntryRequest {
  string occurred_at = 1; // YYYY-MM-DD; not more than 1 day in the future
  string description = 2;
  repeated AcctJournalLineInput lines = 3; // >= 2 lines, Σdebit == Σcredit (enforced by the store)
}

// AcctJournalLine is a stored journal line (read side), joined to its account's code/name.
message AcctJournalLine {
  int32 id = 1;
  string account_code = 2;
  string account_name = 3;
  string side = 4; // debit | credit
  google.type.Decimal amount = 5; // base currency (EUR), always > 0
  google.type.Decimal amount_src = 6; // original-currency trace; unset for most automated postings
  string currency_src = 7;
  string note = 8;
}

// AcctJournalEntry is a journal-entry header with its lines. ReversalOf/ReversedBy implement
// reversal-not-edit: a mistaken entry is never updated or deleted, only mirrored by a new entry
// that references it. `total` is Σdebit (== Σcredit); unset (nil) on the header-only shape
// returned by ListJournalEntries ("без lines").
message AcctJournalEntry {
  int32 id = 1;
  string occurred_at = 2;
  string description = 3;
  string source_type = 4;
  string source_key = 5;
  int32 reversal_of = 6; // 0 = not a reversal
  int32 reversed_by = 7; // 0 = not yet reversed
  string created_by = 8;
  bool has_caveat = 9;
  string caveat = 10;
  repeated AcctJournalLine lines = 11; // empty on the ListJournalEntries header-only shape
  google.type.Decimal total = 12; // unset on the ListJournalEntries header-only shape
}

message CreateJournalEntryResponse {
  AcctJournalEntry entry = 1;
}

message ReverseJournalEntryRequest {
  int32 entry_id = 1;
  string reason = 2;
}

message ReverseJournalEntryResponse {
  AcctJournalEntry entry = 1; // the new reversal entry (sides swapped), with lines
}

message ListJournalEntriesRequest {
  string from = 1; // occurred_at >= from; empty = unbounded
  string to = 2; // occurred_at < to (exclusive); empty = unbounded
  string account_code = 3; // filter via lines; empty = any
  string source_type = 4; // empty = any
  int32 limit = 5;
  int32 offset = 6;
}

message ListJournalEntriesResponse {
  repeated AcctJournalEntry entries = 1; // without lines/total — see AcctJournalEntry
  int32 total = 2; // unpaginated match count
}

message GetJournalEntryRequest {
  int32 id = 1;
}

message GetJournalEntryResponse {
  AcctJournalEntry entry = 1; // with lines
}

// --- periods ---

// AcctPeriod is one accounting month (period is always the 1st). status gates CreateJournalEntry:
// posting into a closed period fails (ErrAcctPeriodClosed).
message AcctPeriod {
  string period = 1; // YYYY-MM-DD, always the 1st of the month
  string status = 2; // open | closed
  string closed_at = 3; // RFC3339; empty when open
  string closed_by = 4; // admin username; empty when open
}

message ListAcctPeriodsRequest {}

message ListAcctPeriodsResponse {
  repeated AcctPeriod periods = 1;
}

message CloseAcctPeriodRequest {
  string month = 1; // target month, YYYY-MM (a YYYY-MM-DD date in the month is also accepted); normalised to the 1st
}

message CloseAcctPeriodResponse {
  bool closed = 1;
  repeated string not_ready = 2; // reason the period could not be closed; empty when closed=true
}

message ReopenAcctPeriodRequest {
  string month = 1; // target month, YYYY-MM (a YYYY-MM-DD date in the month is also accepted); normalised to the 1st
}

message ReopenAcctPeriodResponse {}

// AcctEvent is one posting-outbox event's disposition (the internal JSON payload is omitted).
message AcctEvent {
  int64 id = 1;
  string event_type = 2; // order_paid | order_refund
  string source_key = 3; // order uuid | uuid:refund-seq
  string occurred_at = 4; // RFC3339
  string created_at = 5; // RFC3339
  string processed_at = 6; // RFC3339; empty while still pending
  int32 attempts = 7;
  string last_error = 8; // disposition / skip reason
  bool needs_review = 9;
}
message ListAcctEventsNeedingReviewRequest {
  int32 limit = 1; // default 50
}
message ListAcctEventsNeedingReviewResponse {
  repeated AcctEvent events = 1;
}
message ReprocessAcctEventRequest {
  int64 id = 1;
}
message ReprocessAcctEventResponse {}
message ResolveAcctEventRequest {
  int64 id = 1;
}
message ResolveAcctEventResponse {}

// --- reports (docs/plan-accounting/06-reports.md) ---

message GetTrialBalanceRequest {
  string from = 1;
  string to = 2; // exclusive
}

// TrialBalanceRow is one account's turnover + closing balance over [from, to). balance's sign
// follows the account's section: asset/cogs/opex → debit − credit; liability/equity/revenue →
// credit − debit.
message TrialBalanceRow {
  string code = 1;
  string name = 2;
  string section = 3;
  google.type.Decimal debit = 4;
  google.type.Decimal credit = 5;
  google.type.Decimal balance = 6;
}

message GetTrialBalanceResponse {
  repeated TrialBalanceRow rows = 1;
  google.type.Decimal total_debit = 2;
  google.type.Decimal total_credit = 3;
  bool balanced = 4; // total_debit == total_credit; the ledger's core smoke invariant
}

message GetProfitLossStatementRequest {
  string from = 1;
  string to = 2; // exclusive
}

// AcctPLRow is one P&L account's values across the response's month columns, plus the row total.
message AcctPLRow {
  string code = 1;
  string name = 2;
  repeated google.type.Decimal values = 3; // aligned to GetProfitLossStatementResponse.months
  google.type.Decimal total = 4;
}

// AcctPLSection groups P&L rows by section, in report order (revenue, cogs, opex).
message AcctPLSection {
  string section = 1; // revenue | cogs | opex
  repeated AcctPLRow rows = 2;
}

// AcctPLTotals holds the P&L's derived summary rows, one value per response.months column.
message AcctPLTotals {
  repeated google.type.Decimal total_revenue = 1;
  repeated google.type.Decimal net_cogs = 2;
  repeated google.type.Decimal gross_profit = 3;
  repeated google.type.Decimal gross_margin_pct = 4;
  repeated google.type.Decimal total_opex = 5;
  repeated google.type.Decimal operating_profit = 6;
  repeated google.type.Decimal net_margin_pct = 7;
}

message GetProfitLossStatementResponse {
  repeated string months = 1; // YYYY-MM-DD (1st of month); aligned with rows[].values / totals.*
  repeated AcctPLSection sections = 2;
  AcctPLTotals totals = 3;
  // Phase-1 caveats: always includes "pre-tax profit (no corporate tax accrual)" and "carrier
  // shipping cost not booked (4110 has no 6030 expense pair yet)", plus a count of entries in the
  // period flagged has_caveat.
  repeated string caveats = 4;
}

message GetBalanceSheetRequest {
  string as_of = 1; // inclusive
}

// AcctBalanceSheetRow is one BS account's closing balance as of the report date.
message AcctBalanceSheetRow {
  string code = 1;
  string name = 2;
  google.type.Decimal balance = 3;
}

// AcctBalanceSheetSection is one BS grouping (assets / liabilities / equity) with its rows + total.
message AcctBalanceSheetSection {
  string section = 1; // asset | liability | equity
  repeated AcctBalanceSheetRow rows = 2;
  google.type.Decimal total = 3;
}

message GetBalanceSheetResponse {
  string as_of = 1;
  AcctBalanceSheetSection assets = 2;
  AcctBalanceSheetSection liabilities = 3;
  AcctBalanceSheetSection equity = 4; // includes the virtual "Current Period Net Profit" row
  AcctBalanceSheetRow net_profit_row = 5; // convenience copy of that row; unset if not found by name
  google.type.Decimal total_assets = 6;
  google.type.Decimal total_liabilities = 7;
  google.type.Decimal total_equity = 8;
  google.type.Decimal balance_check = 9; // total_assets − (total_liabilities + total_equity)
  bool balanced = 10; // balance_check == 0
  repeated string caveats = 11;
}

message GetAccountLedgerRequest {
  string code = 1;
  string from = 2; // empty = unbounded (from inception)
  string to = 3; // exclusive; empty = unbounded
  int32 limit = 4;
  int32 offset = 5;
}

// AcctLedgerRow is one drill-down line for an account with its running balance.
message AcctLedgerRow {
  int32 entry_id = 1;
  string occurred_at = 2;
  string description = 3;
  string source_type = 4;
  string source_key = 5;
  string side = 6; // debit | credit
  google.type.Decimal amount = 7;
  string note = 8;
  google.type.Decimal running_balance = 9;
}

message GetAccountLedgerResponse {
  string code = 1;
  string name = 2;
  string section = 3;
  google.type.Decimal opening_balance = 4; // balance before `from`
  google.type.Decimal closing_balance = 5;
  repeated AcctLedgerRow rows = 6;
  int32 total = 7; // unpaginated match count
}

message GetAcctReconciliationRequest {
  string from = 1;
  string to = 2; // exclusive
}

// AcctReconItem is one row inside a reconciliation block (a top-N sample; the block's total_count
// carries the full count). ref is the operational identity (order uuid, movement id, run id, month).
message AcctReconItem {
  string ref = 1;
  string label = 2;
  google.type.Decimal amount = 3;
}

// AcctReconBlock is one reconciliation dimension: the ledger figure, the operational figure, their
// delta, and a bounded item sample. A non-zero delta (outside finished_goods, where drift is
// expected) signals the ledger diverged from operational truth.
message AcctReconBlock {
  string name = 1;
  google.type.Decimal ledger = 2;
  google.type.Decimal operational = 3;
  google.type.Decimal delta = 4;
  repeated AcctReconItem items = 5;
  int32 total_count = 6;
}

message GetAcctReconciliationResponse {
  AcctReconBlock revenue = 1;
  AcctReconBlock fees = 2;
  AcctReconBlock cogs = 3;
  AcctReconBlock materials = 4;
  AcctReconBlock finished_goods = 5;
  AcctReconBlock pending = 6;
  AcctReconBlock unposted_movements = 7;
  AcctReconBlock vat = 8; // phase 2 wave 1: 2070 ledger vs regime-classified order sums
}

// --- VAT filing exports (phase 2, wave 1 — docs/plan-accounting-phase2/01-wave1-vat.md §1.5).
// Both reports are SOURCE-TYPE-AGNOSTIC: they aggregate the 2070 VAT ledger lines of order entries
// by customer_order.vat_regime over the PAYMENT period, so they survive wave 2's prepayment split.
// Refunds net with a minus sign. Numbers are for the accountant's manual JPK_VAT / OSS filing —
// full XML export is phase 3. ---

message GetVatReturnPLRequest {
  // month: YYYY-MM-DD, any day within the target filing month (normalised to the 1st).
  string month = 1;
}

// GetVatReturnPLResponse is the JPK_VAT monthly aggregate (filed by the 25th). Output VAT is split
// by regime (domestic PL, WNT/import self-charge; OSS shown for reference only — OSS is filed via
// GetOssReturn, not JPK, and is excluded from net_payable), input VAT is split by purchase type, and
// net_payable is the resulting liability. Caveats aggregates the period's per-entry caveats.
message GetVatReturnPLResponse {
  string month = 1; // YYYY-MM-DD, normalised to the 1st of the month
  google.type.Decimal output_domestic = 2; // pl_domestic sales output VAT (23%)
  google.type.Decimal output_wnt_self_charge = 3; // WNT/import purchase self-charge output (Art.33a)
  google.type.Decimal oss_info_total = 4; // OSS B2C output VAT, informational only — NOT in net_payable
  google.type.Decimal input_domestic = 5; // recoverable input VAT on domestic_pl purchases
  google.type.Decimal input_wnt = 6; // recoverable input VAT on WNT purchases (nets against output_wnt_self_charge)
  google.type.Decimal input_import = 7; // recoverable input VAT on import purchases (nets against output_wnt_self_charge)
  google.type.Decimal net_payable = 8; // output_domestic + output_wnt_self_charge − input_domestic − input_wnt − input_import
  // UK is a different jurisdiction — filed on the UK return, deliberately NOT in net_payable.
  google.type.Decimal output_uk_stock_domestic = 10; // uk_stock_domestic output VAT (2070)
  google.type.Decimal input_uk_domestic = 11; // domestic_uk purchase input VAT (recoverable in the UK)
  // Zero-rated NET revenue bases JPK still declares (carry no VAT, not in net_payable).
  google.type.Decimal net_wdt = 12; // intra-community supply net base (K_21)
  google.type.Decimal net_export = 13; // export net base (K_22)
  repeated string caveats = 9;
}

message GetOssReturnRequest {
  // quarter: YYYY-MM-DD, first day of the quarter (any day within the quarter is accepted and
  // snapped to that quarter's first day — see dto.ParseAcctQuarterStart).
  string quarter = 1;
}

// AcctOssRow is one destination country's OSS B2C line: country, applied rate, net taxable base and VAT.
message AcctOssRow {
  string country = 1; // ISO alpha-2 ship-to country
  google.type.Decimal rate_pct = 2;
  google.type.Decimal net = 3;
  google.type.Decimal vat = 4;
}

message GetOssReturnResponse {
  string quarter_start = 1; // YYYY-MM-DD, first day of the quarter
  repeated AcctOssRow rows = 2;
  google.type.Decimal total_net = 3;
  google.type.Decimal total_vat = 4;
}

message ExportJpkV7MRequest {
  // month: YYYY-MM-DD, any day within the target filing month (normalised to the 1st).
  string month = 1;
}

message ExportJpkV7MResponse {
  string filename = 1; // suggested download name, e.g. JPK_V7M_2026-07.xml
  string xml_content = 2; // the JPK_V7M(2) XML document (UTF-8)
}

message ExportOssReturnRequest {
  // quarter: YYYY-MM-DD, any day within the target quarter (snapped to the quarter's first day).
  string quarter = 1;
}

message ExportOssReturnResponse {
  string filename = 1; // suggested download name, e.g. OSS_2026-Q3.xml
  string xml_content = 2; // the OSS (VIU-DO) return XML (UTF-8)
}

message GetUkVatReturnRequest {
  // quarter: YYYY-MM-DD, any day within the target quarter (snapped to the quarter's first day).
  string quarter = 1;
}

// GetUkVatReturnResponse is the 9-box UK VAT return. Boxes 2 (EU acquisitions VAT), 8 and 9 (EU
// supplies/acquisitions) are always zero for a post-Brexit GB return, so they are omitted here; Box 3 =
// Box 1 and Box 5 = Box 3 − Box 4.
message GetUkVatReturnResponse {
  string quarter_start = 1; // YYYY-MM-DD, first day of the quarter
  google.type.Decimal box1_output_vat = 2; // VAT due on sales
  google.type.Decimal box3_total_vat_due = 3; // Box 1 + Box 2 (Box 2 = 0)
  google.type.Decimal box4_input_vat = 4; // VAT reclaimed on purchases
  google.type.Decimal box5_net_vat = 5; // Box 3 − Box 4 (payable if positive)
  google.type.Decimal box6_net_sales = 6; // total sales ex-VAT
  google.type.Decimal box7_net_purchases = 7; // total purchases ex-VAT
}

message GetFrs105AccountsRequest {
  string from = 1; // YYYY-MM-DD period start
  string to = 2; // YYYY-MM-DD period end (exclusive)
}

// GetFrs105AccountsResponse is an FRS 105 micro-entity accounts DRAFT: the Income Statement over the
// period and the Statement of Financial Position as at `to`, re-grouped from the ledger. Figures are
// in `currency` (the ledger base currency); the caveats flag that a UK Ltd filing needs GBP + entity
// isolation.
message GetFrs105AccountsResponse {
  string from = 1;
  string to = 2;
  string currency = 3;
  google.type.Decimal turnover = 4;
  google.type.Decimal cost_of_sales = 5;
  google.type.Decimal gross_profit = 6;
  google.type.Decimal administrative_expenses = 7;
  google.type.Decimal depreciation = 8;
  google.type.Decimal operating_profit = 9;
  google.type.Decimal tax = 10;
  google.type.Decimal profit_for_year = 11;
  google.type.Decimal fixed_assets = 12;
  google.type.Decimal current_assets = 13;
  google.type.Decimal creditors_within_year = 14;
  google.type.Decimal net_current_assets = 15;
  google.type.Decimal total_assets_less_current_liab = 16;
  google.type.Decimal creditors_after_year = 17;
  google.type.Decimal net_assets = 18;
  google.type.Decimal capital_and_reserves = 19;
  repeated string caveats = 20;
}

// FixedAsset is one capitalised asset, depreciated straight-line over useful_life_months from acquired_on.
message FixedAsset {
  int32 id = 1;
  string name = 2;
  google.type.Decimal cost_base = 3; // base-currency cost
  string acquired_on = 4; // YYYY-MM-DD
  int32 useful_life_months = 5;
  string disposed_on = 6; // YYYY-MM-DD or empty
}

message CreateFixedAssetRequest {
  string name = 1;
  google.type.Decimal cost_base = 2;
  string acquired_on = 3; // YYYY-MM-DD
  int32 useful_life_months = 4;
}

message CreateFixedAssetResponse {
  int32 id = 1;
}

message ListFixedAssetsRequest {}

message ListFixedAssetsResponse {
  repeated FixedAsset assets = 1;
}

message PostDepreciationRequest {
  string up_to = 1; // YYYY-MM-DD; posts every un-posted monthly charge up to this month
}

message PostDepreciationResponse {
  int32 posted = 1; // number of monthly charges newly posted
}

message AccrueCorporationTaxRequest {
  string from = 1; // YYYY-MM-DD period start
  string to = 2; // YYYY-MM-DD period end (exclusive)
  google.type.Decimal rate_pct = 3; // corporation-tax rate, e.g. 19 or 25
}

message AccrueCorporationTaxResponse {
  google.type.Decimal corp_tax = 1; // amount accrued (0 for a loss period)
  bool already_posted = 2; // true if the period was already accrued (no new posting)
}
