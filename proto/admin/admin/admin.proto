// OpexLineInsert is one operating-expense line item (NF-08). Amount is in `currency`; it is folded
// to the base currency server-side via the manual costing FX rates (left uncosted, and excluded
// from the operating result, when the currency has no rate).
message OpexLineInsert {
  string month = 1; // any date in the target month, YYYY-MM-DD; normalised to the first of the month
  string category = 2; // salaries | rent | software | marketing_other | production_content | other | taxes | bank_fees | professional_services | logistics_office
  string label = 3; // free text distinguishing lines within a month × category (e.g. «Adobe CC», «швея Мария»)
  google.type.Decimal amount = 4; // in `currency`, >= 0
  string currency = 5; // ISO 4217; defaults to the base currency when empty
  string note = 6;
}

// OpexLine is a stored OPEX line item.
message OpexLine {
  int32 id = 1;
  string month = 2;
  string category = 3;
  string label = 4;
  google.type.Decimal amount = 5; // in `currency`
  string currency = 6;
  google.type.Decimal amount_base = 7; // base currency; zero when uncosted (see `costed`)
  bool costed = 8; // false = the currency had no FX rate for the month; excluded from the operating result
  int32 recurring_id = 9; // 0 = manual line; else the recurring template it was materialised from
  string note = 10;
}

message UpsertOpexLinesRequest {
