  // It is a plan-estimate before the marker; the real consumption comes from stock issues.
  rpc GetProductionRunMaterialPlan(GetProductionRunMaterialPlanRequest) returns (GetProductionRunMaterialPlanResponse) {
    option (google.api.http) = {get: "/api/admin/production-runs/{run_id}/material-plan"};
  }

