message UpdateVariantStockRequest {
  common.StockAdjustmentMode mode = 1; // Required: "set" for absolute value, "adjust" for delta
  // R2/p012: stock is addressed by the stable variant id (product_size.id), never the (product_id,
  // size_id) pair — and it NEVER creates a variant (unknown -> NOT_FOUND). Identity change -> old numbers
  // reserved.
  reserved 2, 3;
  reserved "product_id", "size_id";
  int32 quantity = 4; // Required: final value for "set", delta amount for "adjust" (always unsigned)
  common.StockAdjustmentDirection direction = 5; // Required for "adjust" mode, ignored for "set"
  common.StockChangeReason reason = 6; // Required: reason for stock adjustment
  optional string comment = 7; // Optional, but required for reason=OTHER
  int64 variant_id = 8; // Required: the variant to adjust (product_size.id)
}

