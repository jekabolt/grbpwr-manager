// RevenueForecast projects net revenue for the calendar month containing the period end. It blends a
// day-of-week run-rate (trailing 8 weeks) with a seasonal ratio-to-date from last year when that data
// exists. DB-only (no GA4). Directional at this data scale — read the low/high band, not the point.
message RevenueForecast {
  google.protobuf.Timestamp month = 1; // first day of the forecast month
  google.type.Decimal mtd_actual = 2; // net revenue so far this month
  google.type.Decimal forecast = 3; // projected full-month net revenue (blend)
  google.type.Decimal forecast_low = 4; // ~80% interval lower bound
  google.type.Decimal forecast_high = 5;
  google.type.Decimal run_rate = 6; // naive mtd/elapsed × days_in_month, for eyeballing
  string method = 7; // "dow" | "dow+seasonal" | "closed" | "run_rate"
  int32 elapsed_days = 8;
  int32 remaining_days = 9;
  google.type.Decimal last_year_month_total = 10; // 0 when no prior-year data
  string caveat = 11;
}

// DeliverySection reports fulfilment speed for orders PLACED in the period (a placed-cohort, so the
// average is not dragged by tails of earlier periods). Durations come from order_status_history
// timestamps; on-time compares delivered_at against shipment.estimated_arrival_date. Delivered is
// operator-flipped, so gate the delivered-based figures on delivered_coverage_pct / delivered_sample.
message DeliverySection {
  double avg_days_placed_to_shipped = 1;
  double avg_days_shipped_to_delivered = 2;
  double avg_days_placed_to_delivered = 3;
  double median_days_placed_to_delivered = 4;
  double on_time_rate_pct = 5; // delivered on/before the ETA date
  int32 on_time_sample = 6; // orders with both a delivered timestamp and an ETA
  double eta_coverage_pct = 7; // % of delivered orders that had an ETA set
  double delivered_coverage_pct = 8; // % of shipped orders that reached delivered (survivorship gate)
  int32 delivered_sample = 9; // orders with a usable delivered duration (durations denominator)
  int32 shipped_sample = 10; // orders with a usable shipped duration
  repeated TimeSeriesPoint avg_delivery_days_by_week = 11; // value=avg placed→delivered days, count=orders
  string caveat = 12;
}

// OrderValueBandRow is one fixed order-value bucket: how many orders and how much net revenue
// fall in [from, to) EUR. Bands are fixed (not quantile) so they are comparable across periods.
// Order value is net of VAT and after discounts/refunds — consistent with AOV, so band edges will
// not line up with on-site sticker prices.
message OrderValueBandRow {
  string label = 1; // e.g. "€0–50", "€500+"
  google.type.Decimal from = 2; // inclusive lower edge (base currency)
  google.type.Decimal to = 3; // exclusive upper edge; 0 = no upper bound
  int32 orders = 4;
  google.type.Decimal revenue = 5; // net revenue of orders in this band
  double orders_share_pct = 6;
  double revenue_share_pct = 7;
  google.type.Decimal avg_order_value = 8;
}

// ProfitabilitySection is the self-contained "Profitability" tab (analytics-v2 task 07): the margin
// figures and their erosion (discounts), the acquisition-economics block (CPO / blended CAC / LTV /
// LTV·CAC), fulfilment cost per order, returns, and the operating-result roll-up — assembled from the
// SAME builders the dashboard uses so the shared figures tie out. CPO/CAC/LTV·CAC use manually-entered
// media spend (channel_spend): when none is entered has_spend=false and they are 0 (N/A, not "free").
// Cost/margin fields are stripped for accounts without costing:read; ltv (revenue-side) is kept.
message ProfitabilitySection {
  // --- margin and its erosion (assembly of existing figures) ---
  MetricWithComparison gross_margin = 1; // costed revenue − COGS
  MetricWithComparison gross_margin_pct = 2; // gross_margin / costed revenue × 100
  double cost_coverage_pct = 3; // % of product revenue that has a cost set (trust gate for the margins)
  MetricWithComparison total_discount = 4; // product-sale + promo-code discount (base currency)
  MetricWithComparison product_sale_discount = 5;
  MetricWithComparison promo_code_discount = 6;
  MetricWithComparison discount_rate_pct = 7; // total discount / gross revenue × 100 (task 01)
  MetricWithComparison contribution_margin = 8; // gross_margin − shipping − payment fees
  // --- acquisition economics (new) ---
  MetricWithComparison cpo = 9; // marketing_spend / orders — 0 when has_spend=false
  MetricWithComparison blended_cac = 10; // marketing_spend / new_customers — meaningful on monthly+ ranges
  bool has_spend = 11; // false → cpo / blended_cac / ltv_cac_ratio are N/A (no media spend entered)
  google.type.Decimal ltv = 12; // historical CLV mean (realized revenue per customer this period), not predictive
  double ltv_cac_ratio = 13; // ltv / blended_cac — 0 = N/A
  MetricWithComparison fulfilment_cost_per_order = 14; // (shipping + payment fees) / orders
  // --- returns and the bottom line ---
  MetricWithComparison refund_rate = 15; // refunded / gross revenue × 100
  MetricWithComparison total_refunded = 16;
  google.type.Decimal opex_total = 17; // day-pro-rated fixed costs over the period
  google.type.Decimal marketing_spend = 18;
  google.type.Decimal operating_result = 19; // contribution_margin − opex_total − marketing_spend
  string opex_caveat = 20; // OPEX missing/uncosted or double-counted (same wording as the dashboard)
  string caveat = 21; // spend is manual; LTV is historical
}

// --- Dashboard (decision-grade summary) ---

message GetDashboardRequest {
  // Period spec, same grammar as GetMetrics (7d, 30d, 90d, today, WTD, MTD, QTD, YTD).
  string period = 1;
  // Optional window end (defaults to now). The period is measured back from here.
  google.protobuf.Timestamp end_at = 2;
  // Max rows per action list (top-by-margin, reorder, clear, drops). 0 = server default.
  int32 limit = 3;
}

enum AlertSeverity {
  ALERT_SEVERITY_UNSPECIFIED = 0;
  ALERT_SEVERITY_INFO = 1;
  ALERT_SEVERITY_WARNING = 2;
  ALERT_SEVERITY_CRITICAL = 3;
}

// DashboardAlert is a server-computed, threshold-driven alert. Rate-based alerts are gated on
// a minimum order count, so they never fire on a statistically meaningless sample.
message DashboardAlert {
  AlertSeverity severity = 1;
  string code = 2; // stable machine key, e.g. "low_cost_coverage"
  string title = 3;
  string detail = 4;
}

message GetDashboardResponse {
  TimeRange period = 1;
  google.type.Decimal revenue = 2; // net revenue (base currency)
  int32 orders = 3; // net-revenue order count
  google.type.Decimal gross_margin = 4; // costed net revenue − COGS
  double gross_margin_pct = 5;
  // Contribution margin (gross_margin − shipping − payment_fees) = contribution to FIXED COSTS,
  // NOT profit. Fixed costs (salaries, rent, software, marketing, …) are excluded here; see
  // operating_result for the figure after them. Do not read "38% margin" as "38% profit" (task 22).
  google.type.Decimal contribution_margin = 6;
  double cost_coverage_pct = 7; // % of product revenue with a cost set (trust gate for margins)
  string caveat = 8; // set when coverage is low, so margins are only partial
  repeated int32 uncosted_product_ids = 9; // products sold this period with no cost, ranked by revenue
  repeated DashboardAlert alerts = 10;
  repeated ProductMetric top_by_margin = 11; // top revenue products re-ranked by gross margin €
  repeated InventoryHealthRow reorder = 12; // SKUs flagged needs_reorder, most urgent first
  repeated SlowMoverRow clear = 13; // slow movers to clear
  repeated SellThroughByDropRow drops = 14; // drop sell-through
  // GA4-vs-DB revenue reconciliation (task 20 step 1): how much of the period's real (DB)
  // revenue the client-side GA4 tracking actually saw. A low figure means consent banners /
  // ad-blockers / bot filtering are eating attribution, so read ROAS as ≈ shown / coverage.
  google.type.Decimal ga4_revenue = 15; // GA4-reported revenue for the period (analytics cache; base currency)
  double tracking_coverage_pct = 16; // 100 * ga4_revenue / DB gross revenue; 0 when unknown
  // Operating result (task 22): the honest total under contribution — an EBITDA-ish approximation.
  // operating_result = contribution_margin − opex_total − marketing_spend. opex_total is the
  // day-pro-rated fixed-cost journal for the period; marketing_spend is channel_spend for the
  // period (subtracted here, not in contribution). opex_caveat is set when no OPEX is recorded for
  // the period, so the operating result is read as incomplete.
  google.type.Decimal operating_result = 17;
  google.type.Decimal opex_total = 18; // fixed costs (opex_entry) attributed to the period
  google.type.Decimal marketing_spend = 19; // channel_spend for the period (base currency)
  string opex_caveat = 20; // set when OPEX is missing for the period
}

// AlertSettings are the operator-tunable thresholds behind the dashboard alerts.
message AlertSettings {
  double coverage_warn_pct = 1; // warn when cost coverage (% of revenue with a cost) is below this
  double refund_rate_warn_pct = 2; // warn when refund rate is at/above this
  int32 rate_floor_n = 3; // min orders before any rate-based alert fires (significance floor)
  double contribution_trust_pct = 4; // trust the contribution-margin sign only at/above this coverage
  double ga4_coverage_warn_pct = 5; // warn when GA4 tracking coverage (% of DB revenue GA4 sees) is below this (task 20)
  int32 production_run_stale_days = 6; // warn when an open production run is older than this many days (NF-09)
}

message GetAlertSettingsRequest {}

message GetAlertSettingsResponse {
  AlertSettings settings = 1;
}

message UpsertAlertSettingsRequest {
  AlertSettings settings = 1;
}

message UpsertAlertSettingsResponse {}

message FunnelSection {
  FunnelAggregate aggregate = 1;
  repeated DailyFunnel daily = 2;
  // DB-sourced order count for the same period; reconcile with aggregate.purchase_users
  // (GA4 session-scoped) to surface tracking gaps.
  int64 db_orders_count = 3;
  // GA4 Data API session count for the same period; reconcile with aggregate.session_start_users
  // (BQ raw event-scoped) to surface counting methodology differences.
  int64 ga4_sessions = 4;
  // Human-readable note explaining known discrepancies between funnel and overview metrics.
  string caveat = 5;
}

// BusinessMetrics groups the overview metrics by data provenance so consumers can tell
// DB-trusted figures from GA4-estimated ones at a glance. BREAKING: replaces the former
// ~90-field flat message — read metrics from commerce / margin / traffic / email instead.
message BusinessMetrics {
  TimeRange period = 1;
  TimeRange compare_period = 2;
  CommerceCoreMetrics commerce = 3; // DB-trusted sales, customers, discounts, shipping
  MarginMetrics margin = 4; // DB-trusted COGS / margin (from product.cost_price)
  TrafficMetrics traffic = 5; // GA4-estimated sessions / engagement / conversion
  EmailMetrics email = 6; // Resend email-delivery metrics
}

// CommerceCoreMetrics is the DB-authoritative commerce view: sales, customers, discounts,
// shipping, plus their breakdowns and daily series.
message CommerceCoreMetrics {
  MetricWithComparison revenue = 1;
  MetricWithComparison orders_count = 2; // net-revenue statuses only
  MetricWithComparison total_placed_orders = 3; // all placed, any status (status-share denominator)
  MetricWithComparison avg_order_value = 4;
  MetricWithComparison items_per_order = 5;
  MetricWithComparison refund_rate = 6;
  MetricWithComparison promo_usage_rate = 7;
  MetricWithComparison gross_revenue = 8;
  MetricWithComparison total_refunded = 9;
  MetricWithComparison total_discount = 10;
  MetricWithComparison product_sale_discount = 11;
  MetricWithComparison promo_code_discount = 12;
  // revenue (field 1) is NET of VAT. revenue_incl_vat is post-discount/refund revenue BEFORE
  // removing VAT (what the company collected); vat_amount = revenue_incl_vat - revenue. VAT is
  // resolved per order from the destination country (0 for export / pre-feature orders).
  MetricWithComparison revenue_incl_vat = 55;
  MetricWithComparison vat_amount = 56;
  // unique_customers: distinct buyer emails with a net-revenue order in the period (the
  // "покупатели" KPI). Differs from new_customers (first-ever order in the period) and from
  // clv_distribution.sample_size (distinct emails with non-zero apportioned revenue).
  MetricWithComparison unique_customers = 57;
  // peak_day: the single calendar day with the highest net revenue in the period (KPI card).
  // Computed from a daily net-revenue rollup independent of trend_granularity; unset when the
  // period has no revenue.
  PeakDay peak_day = 58;
  // discount_rate_pct: total_discount / gross_revenue × 100 — the share of list revenue given
  // away as product-sale + promo discounts (a margin-erosion factor). lower_is_better. Numerator
  // and denominator differ slightly in refunded-order treatment; see caveat.
  MetricWithComparison discount_rate_pct = 59;
  // new_vs_returning: revenue / orders / AOV split by whether the buyer's first-ever order (any
  // status) falls in the period. Complements the existing new/returning_customers_by_day COUNT
  // series with money. new+returning revenue reconciles with headline revenue.
  NewVsReturningSplit new_vs_returning = 60;
  MetricWithComparison new_subscribers = 13;
  MetricWithComparison new_customers = 14;
  MetricWithComparison repeat_customers_rate = 15;
  MetricWithComparison avg_orders_per_customer = 16;
  MetricWithComparison avg_days_between_orders = 17;
  MetricWithComparison avg_shipping_cost = 18;
  MetricWithComparison total_shipping_cost = 19;
  CLVStats clv_distribution = 20;

  repeated GeographyMetric revenue_by_country = 21;
  repeated GeographyMetric revenue_by_city = 22;
  repeated RegionMetric revenue_by_region = 23;
  repeated GeographyMetric avg_order_by_country = 24;
  repeated CurrencyMetric revenue_by_currency = 25;
  repeated PaymentMethodMetric revenue_by_payment_method = 26;
  repeated ProductMetric top_products_by_revenue = 27;
  repeated ProductMetric top_products_by_quantity = 28;
  repeated CategoryMetric revenue_by_category = 29;
  repeated CrossSellPair cross_sell_pairs = 30;
  repeated PromoMetric revenue_by_promo = 31;
  // Every order PLACED in the period bucketed by its current status (one per bucket); sums to
  // total_placed_orders, not orders_count.
  repeated StatusCount orders_by_status = 32;

  repeated TimeSeriesPoint revenue_by_day = 33;
  repeated TimeSeriesPoint orders_by_day = 34;
  repeated TimeSeriesPoint subscribers_by_day = 35;
  repeated TimeSeriesPoint gross_revenue_by_day = 36;
  repeated TimeSeriesPoint refunds_by_day = 37;
  repeated TimeSeriesPoint avg_order_value_by_day = 38;
  repeated TimeSeriesPoint units_sold_by_day = 39;
  repeated TimeSeriesPoint new_customers_by_day = 40;
  repeated TimeSeriesPoint returning_customers_by_day = 41;
  repeated TimeSeriesPoint shipped_by_day = 42;
  repeated TimeSeriesPoint delivered_by_day = 43;
  repeated TimeSeriesPoint revenue_by_day_compare = 44;
  repeated TimeSeriesPoint orders_by_day_compare = 45;
  repeated TimeSeriesPoint subscribers_by_day_compare = 46;
  repeated TimeSeriesPoint gross_revenue_by_day_compare = 47;
  repeated TimeSeriesPoint refunds_by_day_compare = 48;
  repeated TimeSeriesPoint avg_order_value_by_day_compare = 49;
  repeated TimeSeriesPoint units_sold_by_day_compare = 50;
  repeated TimeSeriesPoint new_customers_by_day_compare = 51;
  repeated TimeSeriesPoint returning_customers_by_day_compare = 52;
  repeated TimeSeriesPoint shipped_by_day_compare = 53;
  repeated TimeSeriesPoint delivered_by_day_compare = 54;
}

// PeakDay is the highest-net-revenue calendar day in the reporting period.
message PeakDay {
  google.protobuf.Timestamp date = 1;
  google.type.Decimal revenue = 2; // net revenue (base currency) on that day
  int32 orders = 3; // net-revenue orders placed that day
}

// NewVsReturningSplit breaks the period's net revenue, orders and AOV into new vs returning
// customers. "New" = the buyer's first-ever order (any status) falls in the period; a customer's
// second order in the same period is still counted new (matching the new_customers_by_day series).
message NewVsReturningSplit {
  MetricWithComparison new_orders = 1;
  MetricWithComparison new_revenue = 2; // net revenue (base currency)
  MetricWithComparison new_aov = 3;
  MetricWithComparison returning_orders = 4;
  MetricWithComparison returning_revenue = 5; // net revenue (base currency)
  MetricWithComparison returning_aov = 6;
  double new_revenue_share_pct = 7; // new_revenue / (new+returning) × 100
  repeated TimeSeriesPoint new_revenue_by_day = 8; // value=EUR revenue, count=orders
  repeated TimeSeriesPoint returning_revenue_by_day = 9;
}

// MarginMetrics is the DB-trusted COGS / margin view (from product.cost_price), computed over
// the "costed" revenue subset; cost_coverage_pct says how much of revenue that subset is.
message MarginMetrics {
  MetricWithComparison revenue_cost = 1; // COGS: Σ(cost × qty), refund-adjusted
  MetricWithComparison gross_margin = 2; // costed net revenue − COGS
  MetricWithComparison gross_margin_pct = 3; // gross_margin / costed net revenue × 100
  MetricWithComparison payment_fees = 4; // Σ Stripe processing fees, NOT refund-adjusted
  MetricWithComparison contribution_margin = 5; // gross_margin − shipping − payment_fees
  double cost_coverage_pct = 6; // % of product revenue with a cost set (trust gate for margins)
  repeated int32 uncosted_product_ids = 7; // sold this period with no cost, ranked by revenue
}

// TrafficMetrics is the GA4-estimated traffic / engagement / conversion view. These figures
// are sampled/modelled by GA4 — treat as directional, not DB-exact.
message TrafficMetrics {
  MetricWithComparison sessions = 1;
  MetricWithComparison users = 2;
  MetricWithComparison new_users = 3;
  MetricWithComparison page_views = 4;
  MetricWithComparison bounce_rate = 5;
  MetricWithComparison avg_session_duration = 6;
  MetricWithComparison pages_per_session = 7;
  MetricWithComparison conversion_rate = 8;
  MetricWithComparison revenue_per_session = 9;

  repeated GeographySessionMetric sessions_by_country = 10;
  repeated ProductViewMetric top_products_by_views = 11;
  repeated TrafficSourceMetric traffic_by_source = 12;
  repeated DeviceMetric traffic_by_device = 13;

  repeated TimeSeriesPoint sessions_by_day = 14;
  repeated TimeSeriesPoint users_by_day = 15;
  repeated TimeSeriesPoint page_views_by_day = 16;
  repeated TimeSeriesPoint conversion_rate_by_day = 17;
  repeated TimeSeriesPoint sessions_by_day_compare = 18;
  repeated TimeSeriesPoint users_by_day_compare = 19;
  repeated TimeSeriesPoint page_views_by_day_compare = 20;
  repeated TimeSeriesPoint conversion_rate_by_day_compare = 21;
}

// EmailMetrics is the Resend email-delivery view.
message EmailMetrics {
  MetricWithComparison emails_sent = 1;
  MetricWithComparison emails_delivered = 2;
  MetricWithComparison email_delivery_rate = 3;
  MetricWithComparison email_open_rate = 4;
  MetricWithComparison email_click_rate = 5;
  MetricWithComparison email_bounce_rate = 6;
}

message PaymentMethodMetric {
  string payment_method = 1;
  google.type.Decimal value = 2;
  int32 count = 3;
}

message TimeRange {
  google.protobuf.Timestamp from = 1;
  google.protobuf.Timestamp to = 2;
}

message MetricWithComparison {
  google.type.Decimal value = 1;
  google.type.Decimal compare_value = 2;
  double change_pct = 3;
  // When true, a negative change is good (e.g. refund rate, bounce rate). Frontend should show green for decrease, red for increase.
  bool lower_is_better = 4;
  // Absolute delta (current - previous) for rate metrics. For percentage/ratio metrics, this is the percentage point change (e.g., 5.0% → 3.0% = -2.0 pp).
  // Frontend should prefer displaying this over change_pct for rate metrics to avoid misleading "rate-of-rates" semantics.
  double change_absolute = 5;
  // Optional tooltip/caveat text to clarify metric interpretation (e.g., data limitations, calculation notes).
  string caveat = 6;
  // Number of observations behind the metric (orders, sessions, customers…). 0 = not
  // populated. Prefer gating a metric on this (e.g. hide/greytext when sample_size < 30)
  // over an arbitrary display floor.
  int32 sample_size = 7;
  // 95% confidence-interval half-width in the metric's own units (e.g. ±2.4 for a 12.0%
  // rate). Populated only for true count-proportions (conversion, promo usage); 0 = not
  // computed. Frontend can render "12.0% ± 2.4" instead of guessing significance from a floor.
  double margin_of_error = 8;
}

message GeographyMetric {
  string country = 1;
  string state = 2;
  string city = 3;
  google.type.Decimal value = 4;
  google.type.Decimal compare_value = 5;
  int32 count = 6;
  int32 compare_count = 7;
  double share_pct = 8; // percentage of total revenue for this geography
  google.type.Decimal avg_order_value = 9; // AOV for this geography
}

message RegionMetric {
  string region = 1;
  google.type.Decimal value = 2;
  int32 count = 3;
}

message GeographySection {
  repeated GeographyMetric by_country = 1;
  repeated GeographySessionMetric sessions_by_country = 2;
  repeated CountryEconomicsRow economics_by_country = 3; // analytics-v2 task 08: per-country profitability
  repeated CountryLogisticsRow logistics_by_country = 4; // analytics-v2 task 09: fulfilment + returns
  repeated CountryDemandRow demand_by_country = 5; // analytics-v2 task 09: conversion + demand mix
}

// CountryLogisticsRow is per-country fulfilment and returns (analytics-v2 task 09). Durations come
// from order_status_history for orders PLACED in the period; delivered figures are operator-flipped so
// gate them on delivered_sample (a small country with one missing flip reads as 0% coverage). Refund
// rate on a handful of orders swings 0↔100, so refund_orders is surfaced for the UI to gate. No
// confidential cost fields — avg_shipping_cost is logistics (not COGS) and stays visible.
message CountryLogisticsRow {
  string country = 1; // ISO-2, as stored in address.country
  double avg_days_placed_to_delivered = 2;
  double avg_days_placed_to_shipped = 3;
  double on_time_rate_pct = 4; // delivered on/before the ETA date
  int32 delivered_sample = 5; // orders with a usable delivered duration (durations denominator)
  google.type.Decimal avg_shipping_cost = 6; // actual carrier cost → tariff fallback, incl. return leg
  double refund_rate_pct = 7; // refunded amount as a share of this country's gross revenue
  int32 refund_orders = 8; // orders with a partial or full refund
}

// CountryDemandRow is per-country demand mix (analytics-v2 task 09): conversion, new-vs-returning and
// the top categories. Conversion is DIRECTIONAL only — sessions are geo-IP (a tourist buying from a
// hotel), and consent/ad-block undercounts them, so the rate is systematically OVER-stated; compare
// countries to each other, never to external benchmarks. GA4's cache is 90 days, so sessions (and thus
// conversion) are 0 when the window exceeds it — the caveat says which. Orders are DB net-revenue,
// attributed by shipping-address country; sessions by GA4 country name mapped to ISO-2 (an unmapped GA4
// country lands in a "(unmatched)" row so it is visible, not dropped).
message CountryDemandRow {
  string country = 1; // ISO-2, or "(unmatched)" for a GA4 country name with no ISO mapping
  int32 sessions = 2; // GA4 sessions over the period (0 if outside the GA4 window)
  int32 orders = 3; // DB net-revenue orders
  double conversion_rate_pct = 4; // orders / sessions × 100 (0 when sessions = 0)
  google.type.Decimal aov = 5; // average order value (base currency), for a self-contained tab
  int32 new_customers = 6;
  int32 returning_customers = 7;
  double new_share_pct = 8; // new / (new + returning) × 100
  repeated CategoryMetric top_categories = 9; // top 3 categories by revenue in this country
  string caveat = 10; // directional-conversion / GA4-window caveat
}

// CountryEconomicsRow is per-country profitability (analytics-v2 task 08): margin and its inputs,
// contribution, profit per order, and average customer LTV. Revenue/orders reconcile with
// by_country (same shipping-address attribution). Margin is over items that HAVE a cost snapshot, so
// gate on cost_coverage_pct and orders — a 2-order country can show 80% margin. gross_margin,
// revenue_cost, contribution_margin, payment_fees and profit_per_order are confidential cost data
// (stripped without costing:read); revenue, orders, discount and ltv_avg (revenue-side) stay visible.
message CountryEconomicsRow {
  string country = 1; // ISO-2, as stored in address.country
  google.type.Decimal revenue = 2; // net revenue (base currency) — ties out with by_country.value
  int32 orders = 3;
  google.type.Decimal revenue_cost = 4; // COGS: Σ(cost snapshot × qty × refund-adjust) over costed items
  google.type.Decimal gross_margin = 5; // costed revenue − COGS
  double gross_margin_pct = 6; // gross_margin / costed revenue × 100
  double cost_coverage_pct = 7; // % of this country's product revenue that has a cost set
  google.type.Decimal shipping_cost = 8; // actual carrier cost → tariff fallback, incl. return leg
  google.type.Decimal payment_fees = 9; // captured Stripe fee (customer_order.payment_fee)
  google.type.Decimal contribution_margin = 10; // gross_margin − shipping − payment fees
  google.type.Decimal profit_per_order = 11; // contribution_margin / orders
  google.type.Decimal total_discount = 12; // product-sale + promo-code discount (base currency)
  google.type.Decimal ltv_avg = 13; // avg lifetime customer value of customers who ordered here this period
  int32 ltv_sample = 14; // number of customers behind ltv_avg
}

message CurrencyMetric {
  string currency = 1;
  google.type.Decimal value = 2;
  int32 count = 3;
}

message ProductMetric {
  int32 product_id = 1;
  string product_name = 2;
  string brand = 3;
  google.type.Decimal value = 4;
  int32 count = 5;
  // Margin fields, populated only for revenue/quantity product breakdowns (zero for
  // view-based metrics). unit_cost is the product's current base-currency COGS;
  // revenue_cost is Σ(cost × net qty); gross_margin = value − revenue_cost. When
  // has_cost is false the product's cost is unknown — treat margins as N/A, not as 100%.
  google.type.Decimal unit_cost = 6;
  google.type.Decimal revenue_cost = 7;
  google.type.Decimal gross_margin = 8;
  double gross_margin_pct = 9;
  bool has_cost = 10;
}

message CategoryMetric {
  int32 category_id = 1;
  string category_name = 2; // Slug/key (e.g., hoodies_sweatshirts)
  google.type.Decimal value = 3;
  int32 count = 4;
  string category_display_name = 5; // Human-readable label (e.g., Hoodies & Sweatshirts)
  // share_pct: this category's value as a percentage of total category revenue in the period.
  // Categories are an item-level split (shipping is not attributed), so shares sum to 100 within
  // the breakdown, not against headline revenue.
  double share_pct = 6;
}

message CrossSellPair {
  int32 product_a_id = 1;
  int32 product_b_id = 2;
  string product_a_name = 3;
  string product_b_name = 4;
  int32 count = 5; // orders containing both A and B (distinct orders)
  double support = 6; // P(A∧B): count / total orders
  double confidence = 7; // P(B|A): count / orders containing A
  double lift = 8; // support / (P(A)·P(B)); >1 ⇒ bought together more than chance, so the client can rank/threshold on strength instead of raw count
}

message PromoMetric {
  string promo_code = 1;
