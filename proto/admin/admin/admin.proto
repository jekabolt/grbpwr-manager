  }
  rpc ListTechCardDevExpenses(ListTechCardDevExpensesRequest) returns (ListTechCardDevExpensesResponse) {
    option (google.api.http) = {get: "/api/admin/tech-card/{tech_card_id}/dev-expenses"};
  }

  // Production runs (партии, task 09): a batch produced from a tech card, with a plan snapshot
