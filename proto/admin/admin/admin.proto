  // Fixed-asset register + straight-line depreciation.
  rpc CreateFixedAsset(CreateFixedAssetRequest) returns (CreateFixedAssetResponse) {
    option (google.api.http) = {
      post: "/api/admin/accounting/fixed-assets"
      body: "*"
    };
  }
  rpc ListFixedAssets(ListFixedAssetsRequest) returns (ListFixedAssetsResponse) {
    option (google.api.http) = {get: "/api/admin/accounting/fixed-assets"};
  }
  // PostDepreciation posts every not-yet-posted monthly depreciation charge up to the given month.
  rpc PostDepreciation(PostDepreciationRequest) returns (PostDepreciationResponse) {
    option (google.api.http) = {
      post: "/api/admin/accounting/depreciation/post"
      body: "*"
    };
  }
  // AccrueCorporationTax posts a corporation-tax accrual on the period's pre-tax profit.
  rpc AccrueCorporationTax(AccrueCorporationTaxRequest) returns (AccrueCorporationTaxResponse) {
    option (google.api.http) = {
      post: "/api/admin/accounting/corporation-tax/accrue"
      body: "*"
    };
  }
}

