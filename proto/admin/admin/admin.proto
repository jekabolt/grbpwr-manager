  bytes raw = 1; // raw PDF bytes
  string filename = 2; // original filename (for display / download)
}

message UploadPatternResponse {
  string url = 1; // CDN url of the stored PDF
  string filename = 2; // echoed original filename
  int64 size_bytes = 3; // stored file size in bytes
}

message ListObjectsPagedRequest {
  int32 limit = 1;
  int32 offset = 2;
  common.OrderFactor order_factor = 4;
}

message ListObjectsPagedResponse {
  repeated common.MediaFull list = 1;
}

message DeleteFromBucketRequest {
  int32 id = 1;
}

message DeleteFromBucketResponse {}

// PRODUCTS MANAGER

message UpsertProductRequest {
  int32 id = 1;
  common.ProductNew product = 2;
}

message UpsertProductResponse {
  int32 id = 1;
}

message GetProductsPagedRequest {
  int32 limit = 1;
  int32 offset = 2;
  repeated common.SortFactor sort_factors = 3;
  common.OrderFactor order_factor = 4;
  common.FilterConditions filter_conditions = 5;
  bool show_hidden = 6;
}

message GetProductsPagedResponse {
  repeated common.Product products = 1;
}

message GetProductByIDRequest {
  int32 id = 1;
}

message GetProductByIDResponse {
  common.ProductFull product = 1;
  // cost_info carries the confidential COGS/provenance fields. Admin-only — this lives on the
  // admin GetProductByID response, never on the shared ProductFull, so it cannot leak to the
  // storefront read path.
  ProductCostInfo cost_info = 2;
}

// ProductCostInfo is the admin-only view of a product's confidential cost of goods and where
// that cost came from. source is "manual" | "tech_card" | "" (unset); tech-card ids are 0
// when absent.
message ProductCostInfo {
  google.type.Decimal cost_price = 1;
  string cost_price_source = 2;
  int32 cost_price_tech_card_id = 3;
  google.protobuf.Timestamp cost_price_updated_at = 4;
  int32 primary_tech_card_id = 5;
}

message SyncProductCostFromTechCardRequest {
  int32 product_id = 1;
  // tech_card_id optionally repoints the product's primary card before seeding; 0 = use the
  // product's existing primary card.
  int32 tech_card_id = 2;
}

message SyncProductCostFromTechCardResponse {
  // the cost_price written, in base currency.
  google.type.Decimal cost_price = 1;
  string currency = 2;
  // the tech card the cost was sourced from.
  int32 tech_card_id = 3;
}

message DeleteProductByIDRequest {
  int32 id = 1;
}

message DeleteProductByIDResponse {}

message UpdateProductSizeStockRequest {
  common.StockAdjustmentMode mode = 1; // Required: "set" for absolute value, "adjust" for delta
  int32 product_id = 2; // Required: product ID
  int32 size_id = 3; // Required: size ID
  int32 quantity = 4; // Required: final value for "set", delta amount for "adjust" (always unsigned)
  common.StockAdjustmentDirection direction = 5; // Required for "adjust" mode, ignored for "set"
  common.StockChangeReason reason = 6; // Required: reason for stock adjustment
  optional string comment = 7; // Optional, but required for reason=OTHER
}

message UpdateProductSizeStockResponse {}

message ListStockChangeHistoryRequest {
  google.protobuf.Timestamp date_from = 1;
  google.protobuf.Timestamp date_to = 2; // inclusive
  int32 product_id = 3;
  optional int32 size_id = 4; // Optional: filter by size
  common.StockChangeSource source = 5;
  int32 limit = 6; // 0 = return all records
  int32 offset = 7;
  optional common.OrderFactor order_factor = 8; // Optional: default DESC (newest first)
}

message ListStockChangeHistoryResponse {
  repeated common.StockChange changes = 1;
  int32 total = 2;
}

message ListStockChangesRequest {
  google.protobuf.Timestamp from = 1; // Required: start date (inclusive)
  google.protobuf.Timestamp to = 2; // Required: end date (inclusive)
  optional int32 product_id = 3; // Optional: filter by product ID
  common.StockChangeSource source = 4; // Optional: filter by source type (enum, UNSPECIFIED = no filter)
