  int32 total = 2;
}

// PackagingBomItem is one line of the global packaging recipe (gap-07 v2 B): a material consumed on
// ship — qty_per_order once per shipment plus qty_per_item × the order's unit count. material_name /
// material_unit are resolved server-side for display and ignored on write.
message PackagingBomItem {
  int32 material_id = 1;
  string material_name = 2; // read-only (display)
  string material_unit = 3; // read-only (display)
  google.type.Decimal qty_per_order = 4; // consumed once per shipped order, >= 0
  google.type.Decimal qty_per_item = 5; // consumed per unit in the order, >= 0
  bool active = 6;
}

message UpsertPackagingBomRequest {
  repeated PackagingBomItem items = 1; // full-replace: this set becomes the whole recipe
}

message UpsertPackagingBomResponse {}

message ListPackagingBomRequest {}

message ListPackagingBomResponse {
  repeated PackagingBomItem items = 1;
}

message ListMaterialLotsRequest {
  int32 material_id = 1;
  bool include_archived = 2;
}

message ListMaterialLotsResponse {
  repeated common.MaterialLot lots = 1;
}

// ADMIN ACCOUNTS (RBAC)

// AccessLevel is the level of access an account has to a section. WRITE implies READ.
enum AccessLevel {
  ACCESS_LEVEL_UNSPECIFIED = 0;
  ACCESS_LEVEL_READ = 1;
  ACCESS_LEVEL_WRITE = 2;
}

// AdminPermission grants an account a level of access to one section.
message AdminPermission {
  // section is a section key from ListAccountSections (e.g. "orders").
  string section = 1;
  AccessLevel access = 2;
}

// AdminAccount is an admin account with its permission set. is_super grants full
// access, in which case permissions is empty.
message AdminAccount {
  string username = 1;
  bool is_super = 2;
  bool disabled = 3;
  repeated AdminPermission permissions = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// AdminSectionInfo describes a grantable section for the permission picker.
message AdminSectionInfo {
  string key = 1;
  string title = 2;
  string description = 3;
}

message GetCurrentAccountRequest {}

message GetCurrentAccountResponse {
  AdminAccount account = 1;
}

message ListAccountSectionsRequest {}

message ListAccountSectionsResponse {
  repeated AdminSectionInfo sections = 1;
}

message ListAccountsRequest {}

message ListAccountsResponse {
  repeated AdminAccount accounts = 1;
}

message CreateAccountRequest {
  string username = 1;
  string password = 2;
  // is_super grants full access; when true, permissions is ignored.
  bool is_super = 3;
  repeated AdminPermission permissions = 4;
}

message CreateAccountResponse {
  AdminAccount account = 1;
}

message UpdateAccountPermissionsRequest {
  string username = 1;
  bool is_super = 2;
  repeated AdminPermission permissions = 3;
}

message UpdateAccountPermissionsResponse {
  AdminAccount account = 1;
}

message SetAccountDisabledRequest {
  string username = 1;
  bool disabled = 2;
}

message SetAccountDisabledResponse {}

message ResetAccountPasswordRequest {
  string username = 1;
  string new_password = 2;
}

message ResetAccountPasswordResponse {}

message DeleteAccountRequest {
  string username = 1;
}

message DeleteAccountResponse {}
