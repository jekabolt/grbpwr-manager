syntax = "proto3";

package admin;

import "common/archive.proto";
import "common/buyer.proto";
import "common/dict.proto";
import "common/filter.proto";
import "common/fitting.proto";
import "common/fulfillment.proto";
import "common/hero.proto";
import "common/inventory.proto";
import "common/language.proto";
import "common/media.proto";
import "common/model.proto";
import "common/order.proto";
import "common/payment.proto";
import "common/product.proto";
import "common/production.proto";
import "common/promo.proto";
import "common/sample.proto";
import "common/shipment.proto";
import "common/support.proto";
import "common/task.proto";
import "common/techcard.proto";
import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "google/type/decimal.proto";

option go_package = "github.com/jekabolt/grbpwr-products-manager/proto/admin;admin";

service AdminService {
  // KEY VALUE DICTIONARY

  // Retrieves a key-value dictionary.
  rpc GetDictionary(GetDictionaryRequest) returns (GetDictionaryResponse) {
    option (google.api.http) = {get: "/api/admin/dictionary"};
  }

  // BUCKET MANAGER

  // UploadContentImage uploads an image to a specific folder with a specified name.
  rpc UploadContentImage(UploadContentImageRequest) returns (UploadContentImageResponse) {
    option (google.api.http) = {
      post: "/api/admin/content/image"
      body: "*"
    };
  }

  // UploadContentVideo uploads a video to a specific folder with a specified name.
  rpc UploadContentVideo(UploadContentVideoRequest) returns (UploadContentVideoResponse) {
    option (google.api.http) = {
      post: "/api/admin/content/video"
      body: "*"
    };
  }

  // UploadPattern uploads a PDF выкройка (cut pattern) to object storage and returns its
  // url. Used for both tech-card per-size patterns and fitting iteration patterns. The
  // file is stored raw (no image processing) and is NOT added to the media library.
  rpc UploadPattern(UploadPatternRequest) returns (UploadPatternResponse) {
    option (google.api.http) = {
      post: "/api/admin/content/pattern"
      body: "*"
    };
  }

  // DeleteFromBucket deletes objects specified by their keys.
  rpc DeleteFromBucket(DeleteFromBucketRequest) returns (DeleteFromBucketResponse) {
    option (google.api.http) = {delete: "/api/admin/content"};
  }

  // ListObjectsPaged lists all objects in the base folder.
  rpc ListObjectsPaged(ListObjectsPagedRequest) returns (ListObjectsPagedResponse) {
    option (google.api.http) = {get: "/api/admin/content"};
  }

  // PRODUCTS MANAGER

  // CreateColorway creates a new DRAFT colourway attached to an existing style (R2/R4 write
  // decomposition; replaces the coupled UpsertColorway). It writes only colourway-owned fields — no
  // style facts (UpdateStyle), no variants (CreateVariant), no size chart (UpdateStyleSizeChart). The
  // colourway starts DRAFT and is made live through PublishColorway.
  rpc CreateColorway(CreateColorwayRequest) returns (CreateColorwayResponse) {
    option (google.api.http) = {
      post: "/api/admin/colorways"
      body: "*"
    };
  }

  // UpdateColorway patches a colourway's own merchandising fields under an optimistic lock
  // (expected_colorway_version = the shared tech_card.lock_version). It never touches style facts,
  // variants, stock or the size chart (R2/R4).
  rpc UpdateColorway(UpdateColorwayRequest) returns (UpdateColorwayResponse) {
    option (google.api.http) = {
      patch: "/api/admin/colorways/{colorway_id}"
      body: "*"
    };
  }

  // UpdateColorwayRecipe replaces a colourway's material recipe (usages) — the write-path cut in the
  // R1 merge (R2/R4: the recipe is a colourway-owned sub-aggregate with its own concurrency).
  // Optimistically locked on the shared tech_card.lock_version; each usage references a style BOM
  // line by its stable line_key (S2/S3), resolved to a real bom_item_id FK. Restores the previously
  // accepted-but-never-written ColorwayDevelopmentInsert.usages (the silent no-op, A3.4).
  rpc UpdateColorwayRecipe(UpdateColorwayRecipeRequest) returns (UpdateColorwayRecipeResponse) {
    option (google.api.http) = {
      put: "/api/admin/colorways/{colorway_id}/recipe"
      body: "*"
    };
  }

  // Gets a colourway by its id.
  rpc GetColorwayByID(GetColorwayByIDRequest) returns (GetColorwayByIDResponse) {
    option (google.api.http) = {get: "/api/admin/colorways/{colorway_id}"};
  }

  // Retrieves a paginated list of colourways. NOTE on ordering: grpc-gateway's mux prepends
  // handlers, so the LAST-declared route wins — the literal `/colorways/paged` GET must be declared
  // AFTER `/colorways/{colorway_id}` or {colorway_id} captures "paged" (beta seeding caught this).
  rpc GetColorwaysPaged(GetColorwaysPagedRequest) returns (GetColorwaysPagedResponse) {
    option (google.api.http) = {get: "/api/admin/colorways/paged"};
  }

  // ArchiveColorwayByID retires a colourway (archive-not-delete, R6/R9): ACTIVE|HIDDEN -> ARCHIVED
  // (terminal). Was DeleteColorwayByID.
  rpc ArchiveColorwayByID(ArchiveColorwayByIDRequest) returns (ArchiveColorwayByIDResponse) {
    option (google.api.http) = {
      post: "/api/admin/colorways/{colorway_id}/archive"
      body: "*"
    };
  }

  // PublishColorway transitions a DRAFT colourway to ACTIVE (R6), enforcing the sellable
  // preconditions (built base SKU, ≥1 valid-SKU variant, complete sku_season+model_no, dictionary
  // colour, country, price, default translation).
  rpc PublishColorway(PublishColorwayRequest) returns (PublishColorwayResponse) {
    option (google.api.http) = {
      post: "/api/admin/colorways/{colorway_id}/publish"
      body: "*"
    };
  }

  // TransitionColorwayStatus applies a non-publish lifecycle edge (R6): ACTIVE<->HIDDEN and
  // ACTIVE|HIDDEN->ARCHIVED, validated through the server state machine. Publish has its own RPC
  // because it carries preconditions.
  rpc TransitionColorwayStatus(TransitionColorwayStatusRequest) returns (TransitionColorwayStatusResponse) {
    option (google.api.http) = {
      post: "/api/admin/colorways/{colorway_id}/status"
      body: "*"
    };
  }

  // Updates the stock for a specific product size.
  rpc UpdateVariantStock(UpdateVariantStockRequest) returns (UpdateVariantStockResponse) {
    option (google.api.http) = {
      post: "/api/admin/stock/update"
      body: "*"
    };
  }

  // CreateVariant adds a new variant (size) to a colourway at zero stock (R2). The size is immutable;
  // the variant SKU is minted from the colourway's base. Fails if the size already exists or the
  // colourway is archived.
  rpc CreateVariant(CreateVariantRequest) returns (CreateVariantResponse) {
    option (google.api.http) = {
      post: "/api/admin/colorways/{colorway_id}/variants"
      body: "*"
    };
  }

  // UpdateVariant patches a variant's mutable state (R2). size_id and the variant SKU are immutable;
  // only the lifecycle status is writable (archive-not-delete).
  rpc UpdateVariant(UpdateVariantRequest) returns (UpdateVariantResponse) {
    option (google.api.http) = {
      patch: "/api/admin/variants/{variant_id}"
      body: "*"
    };
  }

  // ArchiveVariant retires a variant (ACTIVE -> ARCHIVED, R2): it drops off the storefront and rejects
  // stock writes, but its id stays valid for the frozen order/stock references.
  rpc ArchiveVariant(ArchiveVariantRequest) returns (ArchiveVariantResponse) {
    option (google.api.http) = {
      post: "/api/admin/variants/{variant_id}/archive"
      body: "*"
    };
  }

  // UpdateStyle is the SOLE writer of a style's catalogue facts (brand, sku_season, collection,
  // target_gender, fit, composition, care instructions, model-wears, categories) — R4/§14.7. It is
  // optimistically locked on expected_lock_version (stale -> ABORTED). Changing a SKU fact (season)
  // re-mints every unfrozen sibling colourway in one tx; if ANY sibling is SKU-frozen (has order/label
  // history) the change is refused (FAILED_PRECONDITION) — use CloneStyleForSeason instead. PLM facts
  // (BOM/POM/ops/lifecycle) stay on UpdateTechCard; no fact is written by both.
  rpc UpdateStyle(UpdateStyleRequest) returns (UpdateStyleResponse) {
    option (google.api.http) = {
      patch: "/api/admin/styles/{style_id}"
      body: "*"
    };
  }

  // GetStyleSizeChart returns a style's full size chart plus the shared lock_version (R5). The admin
  // UI loads the whole chart before editing, because UpdateStyleSizeChart is a full-replace.
  rpc GetStyleSizeChart(GetStyleSizeChartRequest) returns (GetStyleSizeChartResponse) {
    option (google.api.http) = {get: "/api/admin/styles/{style_id}/size-chart"};
  }

  // GetStyleCutList is the first real consumer of the piece.mirrored flag (Q6): a read-only cut-list
  // for production. For each cut-piece it expands the quantity (pieces_per_garment × 2 for a mirrored
  // pair) and resolves, per colourway, which fabric (and fusing) BOM line it is cut from. It is a
  // projection over the tech card — no marker/CAD export, no mutable table.
  rpc GetStyleCutList(GetStyleCutListRequest) returns (GetStyleCutListResponse) {
    option (google.api.http) = {get: "/api/admin/styles/{tech_card_id}/cut-list"};
  }

  // UpdateStyleSizeChart replaces a style's ENTIRE size chart in one versioned request (R5). A colourway
  // save never touches the chart; the chart is style-owned and shared by every colourway of the style.
  rpc UpdateStyleSizeChart(UpdateStyleSizeChartRequest) returns (UpdateStyleSizeChartResponse) {
    option (google.api.http) = {
      put: "/api/admin/styles/{style_id}/size-chart"
      body: "*"
    };
  }

  // CloneStyleForSeason deep-clones a style (tech card header + ALL children) under a new sku_season
  // (R4 official path for a season change that would otherwise re-mint frozen siblings). The clone
  // starts as a fresh DRAFT tech card with no colourways; move drafts onto it with RelinkDraftColorway
  // or create new ones. Optimistically guarded on the source's expected_source_version.
  rpc CloneStyleForSeason(CloneStyleForSeasonRequest) returns (CloneStyleForSeasonResponse) {
    option (google.api.http) = {
      post: "/api/admin/styles/{source_style_id}/clone-for-season"
      body: "*"
    };
  }

  // RelinkDraftColorway moves a DRAFT colourway onto a different style (R4 official workaround for the
  // frozen-sibling problem). Only a DRAFT may be relinked; both sides are optimistically locked and the
  // colourway's SKU is re-minted from the target style's facts.
  rpc RelinkDraftColorway(RelinkDraftColorwayRequest) returns (RelinkDraftColorwayResponse) {
    option (google.api.http) = {
      post: "/api/admin/colorways/{colorway_id}/relink"
      body: "*"
    };
  }

  // GetColorwayCustoms returns a product's international-shipping customs data (HS code, origin,
  // declared description).
  rpc GetColorwayCustoms(GetColorwayCustomsRequest) returns (GetColorwayCustomsResponse) {
    option (google.api.http) = {get: "/api/admin/colorways/{colorway_id}/customs"};
  }

  // SetColorwayCustoms sets a colourway's customs data used to build international shipping labels.
  rpc SetColorwayCustoms(SetColorwayCustomsRequest) returns (SetColorwayCustomsResponse) {
    option (google.api.http) = {
      post: "/api/admin/colorways/customs"
      body: "*"
    };
  }

  // SyncColorwayCostFromOwningStyle (re)seeds a colourway's confidential cost_price from its owning
  // style's primary card, overriding any manual value. R4/p019: it derives the style from the owner
  // relation and never repoints it — cost provenance is separated from ownership. Was
  // SyncColorwayCostFromStyle.
  rpc SyncColorwayCostFromOwningStyle(SyncColorwayCostFromOwningStyleRequest) returns (SyncColorwayCostFromOwningStyleResponse) {
    option (google.api.http) = {
      post: "/api/admin/colorways/{colorway_id}/cost/sync"
      body: "*"
    };
  }

  // Lists stock change history with optional filters.
  rpc ListStockChangeHistory(ListStockChangeHistoryRequest) returns (ListStockChangeHistoryResponse) {
    option (google.api.http) = {get: "/api/admin/stock-change-history"};
  }

  // Lists stock changes with simplified format for reporting.
  rpc ListStockChanges(ListStockChangesRequest) returns (ListStockChangesResponse) {
    option (google.api.http) = {get: "/api/admin/stock-changes"};
  }

  // DICTIONARY MANAGER (R9)
  // Controlled merch dictionaries: colour / collection / tag, plus the closed ISO country dictionary.
  // Every mutation carries expected_version (optimistic concurrency on the namespace's
  // dictionary_revision, 0 = unconditional) and returns the new revision. There is no delete: an in-use
  // entry is archived (FK RESTRICT). Country is closed — only activation toggles (the full ISO set is
  // seeded), so it has no create/rename/archive.

  rpc ListColors(ListColorsRequest) returns (ListColorsResponse) {
    option (google.api.http) = {get: "/api/admin/dictionaries/colors"};
  }
  rpc CreateColor(CreateColorRequest) returns (CreateColorResponse) {
    option (google.api.http) = {
      post: "/api/admin/dictionaries/colors"
      body: "*"
    };
  }
  rpc UpdateColor(UpdateColorRequest) returns (UpdateColorResponse) {
    option (google.api.http) = {
      patch: "/api/admin/dictionaries/colors/{code}"
      body: "*"
    };
  }
  rpc ArchiveColor(ArchiveColorRequest) returns (ArchiveColorResponse) {
    option (google.api.http) = {
      post: "/api/admin/dictionaries/colors/{code}/archive"
      body: "*"
    };
  }

  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse) {
    option (google.api.http) = {get: "/api/admin/dictionaries/collections"};
  }
  rpc CreateCollection(CreateCollectionRequest) returns (CreateCollectionResponse) {
    option (google.api.http) = {
      post: "/api/admin/dictionaries/collections"
      body: "*"
    };
  }
  rpc UpdateCollection(UpdateCollectionRequest) returns (UpdateCollectionResponse) {
    option (google.api.http) = {
      patch: "/api/admin/dictionaries/collections/{id}"
      body: "*"
    };
  }
  rpc ArchiveCollection(ArchiveCollectionRequest) returns (ArchiveCollectionResponse) {
    option (google.api.http) = {
      post: "/api/admin/dictionaries/collections/{id}/archive"
      body: "*"
    };
  }

  rpc ListTags(ListTagsRequest) returns (ListTagsResponse) {
    option (google.api.http) = {get: "/api/admin/dictionaries/tags"};
  }
  rpc CreateTag(CreateTagRequest) returns (CreateTagResponse) {
    option (google.api.http) = {
      post: "/api/admin/dictionaries/tags"
      body: "*"
    };
  }
  rpc UpdateTag(UpdateTagRequest) returns (UpdateTagResponse) {
    option (google.api.http) = {
      patch: "/api/admin/dictionaries/tags/{id}"
      body: "*"
    };
  }
  rpc ArchiveTag(ArchiveTagRequest) returns (ArchiveTagResponse) {
    option (google.api.http) = {
      post: "/api/admin/dictionaries/tags/{id}/archive"
      body: "*"
    };
  }

  rpc CreateFiber(CreateFiberRequest) returns (CreateFiberResponse) {
    option (google.api.http) = {
      post: "/api/admin/dictionaries/fibers"
      body: "*"
    };
  }
  rpc ArchiveFiber(ArchiveFiberRequest) returns (ArchiveFiberResponse) {
    option (google.api.http) = {
      post: "/api/admin/dictionaries/fibers/{code}/archive"
      body: "*"
    };
  }

  rpc ListCountries(ListCountriesRequest) returns (ListCountriesResponse) {
    option (google.api.http) = {get: "/api/admin/dictionaries/countries"};
  }
  rpc SetCountryActive(SetCountryActiveRequest) returns (SetCountryActiveResponse) {
    option (google.api.http) = {
      post: "/api/admin/dictionaries/countries/{code}/active"
      body: "*"
    };
  }

  // PROMO MANAGER

  // Adds a new promotional code
  rpc AddPromo(AddPromoRequest) returns (AddPromoResponse) {
    option (google.api.http) = {
      post: "/api/admin/promo/add"
      body: "*"
    };
  }

  // Updates an existing promotional code in place — the mutable fields (free_shipping, discount,
  // expiration, start, voucher and the `allowed` on/off toggle), identified by promo.code — without
  // the delete+recreate that drops the row's identity and history. Re-enables a disabled code by
  // sending allowed=true.
  rpc UpdatePromoCode(UpdatePromoCodeRequest) returns (UpdatePromoCodeResponse) {
    option (google.api.http) = {
      put: "/api/admin/promo/update"
      body: "*"
    };
  }

  // Lists all promotional codes
  rpc ListPromos(ListPromosRequest) returns (ListPromosResponse) {
    option (google.api.http) = {get: "/api/admin/promo/list"};
  }

  // Deletes a specific promotional code
  rpc DeletePromoCode(DeletePromoCodeRequest) returns (DeletePromoCodeResponse) {
    option (google.api.http) = {delete: "/api/admin/promo/{code}/delete"};
  }

  // Disables a specific promotional code
  rpc DisablePromoCode(DisablePromoCodeRequest) returns (DisablePromoCodeResponse) {
    option (google.api.http) = {
      post: "/api/admin/promo/{code}/disable"
      body: "*"
    };
  }

  // ORDER MANAGER

  // Retrieves an order by its ID
  rpc GetOrderByUUID(GetOrderByUUIDRequest) returns (GetOrderByUUIDResponse) {
    option (google.api.http) = {get: "/api/admin/order/{order_uuid}"};
  }

  // Updates shipping information for an order
  rpc SetTrackingNumber(SetTrackingNumberRequest) returns (SetTrackingNumberResponse) {
    option (google.api.http) = {
      post: "/api/admin/orders/{order_uuid}/set-tracking-number"
      body: "*"
    };
  }

  // Retrieves orders by their status payment method or email
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse) {
    option (google.api.http) = {
      post: "/api/admin/orders/list"
      body: "*"
    };
  }

  // Processes a refund for an order
  rpc RefundOrder(RefundOrderRequest) returns (RefundOrderResponse) {
    option (google.api.http) = {
      post: "/api/admin/orders/{order_uuid}/refund"
      body: "*"
    };
  }

  // Marks an order as delivered
  rpc DeliveredOrder(DeliveredOrderRequest) returns (DeliveredOrderResponse) {
    option (google.api.http) = {
      post: "/api/admin/orders/{order_uuid}/delivered"
      body: "*"
    };
  }

  // Retrieves metrics for a period. Request sections to include (empty = business only).
  // Supports: business, funnel, oos_impact, payment_failures, web_vitals, user_journeys,
  // session_duration, device_funnel, product_engagement, form_errors, exceptions, not_found,
  // hero_funnel, size_confidence, payment_recovery, checkout_timings, cohort_retention,
  // order_sequence, entry_products, revenue_pareto, spending_curve, category_loyalty,
  // inventory_health, size_run_efficiency.
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse) {
    option (google.api.http) = {get: "/api/admin/metrics"};
  }

  // GetDashboard returns a small, DB-trusted decision payload: headline revenue/orders/margin
  // (+ caveat), server-computed alerts, and short action lists (top by margin €, reorder,
  // clear, drop sell-through). Use GetMetrics for deep, sectioned drill-down.
  rpc GetDashboard(GetDashboardRequest) returns (GetDashboardResponse) {
    option (google.api.http) = {get: "/api/admin/dashboard"};
  }

  // GetStyleEconomics returns a single "style as a business case" card for one tech card: its
  // lifetime sales margin (all colourway SKUs), the R&D development-cost roll-up, the number of
  // fitting rounds, and a plan/fact production summary — one place tying a style's revenue to the
  // money spent developing and making it. Cost/margin fields are costing:read-gated.
  rpc GetStyleEconomics(GetStyleEconomicsRequest) returns (GetStyleEconomicsResponse) {
    option (google.api.http) = {get: "/api/admin/metrics/style-economics"};
  }

  // GetStyleCostEstimate returns the transparent estimated (plan) cost of one style colourway
  // (Q4): a line-by-line material breakdown resolved via the price ladder
  // (bom_item.unit_price → latest material_price → base via costing FX), each line carrying its
  // price source/date/currency, plus the typed cost articles (cmt/hardware/packaging/logistics/
  // overhead) and defect %, and a plan-vs-fact comparison (estimate vs production-run actual vs
  // the order-time cost snapshot). All money is costing:read-gated; the estimate is a read
  // projection and never writes product.cost_price.
  rpc GetStyleCostEstimate(GetStyleCostEstimateRequest) returns (GetStyleCostEstimateResponse) {
    option (google.api.http) = {get: "/api/admin/metrics/style-cost-estimate"};
  }

  // GetChannelRoasSettled returns per-channel ROAS/CAC computed from the AUTHORITATIVE settled order
  // revenue (task 20 step 2), attributing orders to channels server-side via the bq_order_channel map
  // (order.ga_client_id → last non-direct UTM). Unlike the GA4-revenue campaign attribution, the
  // numerator is real settled base revenue and CAC is per-channel. Read alongside GetMetrics'
  // GA4-based attribution for upper-funnel context.
  rpc GetChannelRoasSettled(GetChannelRoasSettledRequest) returns (GetChannelRoasSettledResponse) {
    option (google.api.http) = {get: "/api/admin/metrics/channel-roas-settled"};
  }

  // Reads the operator-tunable thresholds behind the dashboard alerts.
  rpc GetAlertSettings(GetAlertSettingsRequest) returns (GetAlertSettingsResponse) {
    option (google.api.http) = {get: "/api/admin/dashboard/alert-settings"};
  }

  // Updates the operator-tunable dashboard alert thresholds.
  rpc UpsertAlertSettings(UpsertAlertSettingsRequest) returns (UpsertAlertSettingsResponse) {
    option (google.api.http) = {
      post: "/api/admin/dashboard/alert-settings/upsert"
      body: "*"
    };
  }

  // Sets per-SKU inventory reorder targets used by the inventory-health metrics.
  rpc UpsertInventoryTargets(UpsertInventoryTargetsRequest) returns (UpsertInventoryTargetsResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/inventory/targets/upsert"
      body: "*"
    };
  }

  // Records operator-entered marketing spend per channel per day, used for ROAS.
  rpc UpsertChannelSpend(UpsertChannelSpendRequest) returns (UpsertChannelSpendResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/channel-spend/upsert"
      body: "*"
    };
  }

  // UpsertOpexLines writes OPEX line items (NF-08) — each with its own currency (folded to base) and
  // a label — upserting on (month, category, label). Requires costing:write.
  rpc UpsertOpexLines(UpsertOpexLinesRequest) returns (UpsertOpexLinesResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/lines/upsert"
      body: "*"
    };
  }

  // DeleteOpexLine removes one OPEX line by id. Requires costing:write.
  rpc DeleteOpexLine(DeleteOpexLineRequest) returns (DeleteOpexLineResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/lines/delete"
      body: "*"
    };
  }

  // ListOpexLines returns OPEX lines within an inclusive month range, optional category. Requires
  // costing:read (returns empty otherwise — the figures are confidential cost data).
  rpc ListOpexLines(ListOpexLinesRequest) returns (ListOpexLinesResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/lines/list"
      body: "*"
    };
  }

  // UpsertOpexRecurring inserts (id==0) or updates a recurring OPEX template (salary, subscription,
  // rent) materialised into monthly lines by a worker. Requires costing:write.
  rpc UpsertOpexRecurring(UpsertOpexRecurringRequest) returns (UpsertOpexRecurringResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/recurring/upsert"
      body: "*"
    };
  }

  // ArchiveOpexRecurring stops a recurring template from materialising further months. Requires
  // costing:write.
  rpc ArchiveOpexRecurring(ArchiveOpexRecurringRequest) returns (ArchiveOpexRecurringResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/recurring/archive"
      body: "*"
    };
  }

  // ListOpexRecurring returns recurring OPEX templates (active-only unless include_archived).
  // Requires costing:read (returns empty otherwise).
  rpc ListOpexRecurring(ListOpexRecurringRequest) returns (ListOpexRecurringResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/recurring/list"
      body: "*"
    };
  }

  // UpsertEmployee inserts (id==0) or updates an employee-registry row — the person behind a salary
  // OpexRecurring template (gap-07 v2 A). Requires analytics:write.
  rpc UpsertEmployee(UpsertEmployeeRequest) returns (UpsertEmployeeResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/employees/upsert"
      body: "*"
    };
  }

  // ArchiveEmployee soft-archives an employee; linked recurring templates keep their employee_id.
  // Requires analytics:write.
  rpc ArchiveEmployee(ArchiveEmployeeRequest) returns (ArchiveEmployeeResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/employees/archive"
      body: "*"
    };
  }

  // ListEmployees returns registry rows (active-only unless include_archived). Requires analytics:read.
  rpc ListEmployees(ListEmployeesRequest) returns (ListEmployeesResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/employees/list"
      body: "*"
    };
  }

  // Cancels an order
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse) {
    option (google.api.http) = {
      post: "/api/admin/orders/{order_uuid}/cancel"
      body: "*"
