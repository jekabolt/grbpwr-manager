// PRODUCTS MANAGER

// CreateColorway/UpdateColorway/UpdateStyle replace the coupled UpsertColorway (R2/R4 write
// decomposition, §6). A colourway is created DRAFT against an existing style and carries only
// colourway-owned fields; the style facts are patched separately through UpdateStyle under a shared
// optimistic lock.
message CreateColorwayRequest {
  int32 style_id = 1; // the single style relation (R4); the colourway attaches to an existing style
  reserved 2; // color_code is carried by merchandising.color_code (§1.5, the sole write identity)
  reserved "color_code";
  common.ColorwayMerchandisingInsert merchandising = 3;
  common.ColorwayDevelopmentInsert development = 4; // dev/lab-dip; recipe persistence lands with T-A (existing gap)
  int32 thumbnail_media_id = 5;
  int32 secondary_thumbnail_media_id = 6;
  repeated int32 media_ids = 7;
  repeated common.ColorwayTagInsert tags = 8;
  repeated common.ColorwayPriceInsert prices = 9;
  repeated common.ColorwayInsertTranslation translations = 10; // merch translation overrides (R4)
  google.type.Decimal cost_price = 11; // write-only COGS (costing:write)
  string country_code = 12; // ISO 3166-1 alpha-2 (R9)
  // status is server-owned = DRAFT.
}

message CreateColorwayResponse {
  int32 colorway_id = 1;
}

message UpdateColorwayRequest {
  int32 colorway_id = 1;
  uint64 expected_colorway_version = 2; // the shared tech_card.lock_version
  common.ColorwayMerchandisingInsert merchandising = 3;
  common.ColorwayDevelopmentInsert development = 4;
  repeated int32 media_ids = 5;
  repeated common.ColorwayTagInsert tags = 6;
  repeated common.ColorwayPriceInsert prices = 7;
  google.protobuf.FieldMask update_mask = 8;
  int32 thumbnail_media_id = 9;
  int32 secondary_thumbnail_media_id = 10;
  google.type.Decimal cost_price = 11; // write-only COGS (costing:write); omit to leave unchanged
  string country_code = 12; // ISO
  repeated common.ColorwayInsertTranslation translations = 13; // merch translation overrides (sparse: empty = unchanged)
  // NOT here: variants/quantity, size chart, style facts.
}

message UpdateColorwayResponse {
  int32 lock_version = 1; // the new shared lock_version
}

message UpdateColorwayRecipeRequest {
  int32 colorway_id = 1;
  // expected_colorway_version echoes the shared tech_card.lock_version (R4); a mismatch -> Aborted.
  int32 expected_colorway_version = 2;
  repeated common.TechCardColorwayUsage usages = 3; // the full recipe (full-replace for this colourway)
}

message UpdateColorwayRecipeResponse {
  int32 lock_version = 1; // the new shared lock_version after the recipe write
}

// StylePatch is the narrow set of catalogue-style facts UpdateStyle owns (R4/§14.7-8). It deliberately
// does NOT reuse the heavy TechCardInsert, so a style-catalogue edit can never full-replace the PLM
// children (BOM/POM/ops). category_id stays a PLM/UpdateTechCard fact; canonical style translations
// await a dedicated style_translation table (deferred).
message StylePatch {
  string brand = 1;
  common.SeasonEnum season = 2; // sku_season code (the SKU-facing season); the year is preserved
  string collection = 3;
  common.GenderEnum target_gender = 4;
  string fit = 5;
  string composition = 6;
  string care_instructions = 7;
  int32 model_wears_height_cm = 8;
  int32 model_wears_size_id = 9;
  int32 top_category_id = 10;
  int32 sub_category_id = 11;
  int32 type_id = 12;
}

message UpdateStyleRequest {
  int64 style_id = 1;
  StylePatch patch = 2;
  uint64 expected_lock_version = 3; // shared tech_card.lock_version; stale -> ABORTED
  google.protobuf.FieldMask update_mask = 4;
}

message UpdateStyleResponse {
  int32 lock_version = 1; // the new shared lock_version
}

message GetColorwaysPagedRequest {
  int32 limit = 1;
  int32 offset = 2;
  repeated common.SortFactor sort_factors = 3;
  common.OrderFactor order_factor = 4;
  common.FilterConditions filter_conditions = 5;
  reserved 6; // was bool show_hidden — replaced by an explicit lifecycle-status filter (R6/§14.6)
  reserved "show_hidden";
  repeated common.ColorwayLifecycleStatus statuses = 7; // empty = the default admin set (all but ARCHIVED)
}

message GetColorwaysPagedResponse {
  repeated common.Colorway colorways = 1; // R8: renamed from products
  reserved "products";
  int32 total = 2; // total matching colourways ignoring pagination
}

message GetColorwayByIDRequest {
  int32 colorway_id = 1; // R8: renamed from id
  reserved "id";
}

message GetColorwayByIDResponse {
  common.ColorwayFull colorway = 1; // R8: renamed from product
  reserved "product";
  // cost_info carries the confidential COGS/provenance fields. Admin-only — this lives on the
  // admin GetColorwayByID response, never on the shared ColorwayFull, so it cannot leak to the
  // storefront read path.
  ColorwayCostInfo cost_info = 2;
  // usages is this colourway's material recipe (H1 fix: the recipe is colourway-owned — S2/S3,
  // 01-DOMAIN-MODEL §2.3 — so GetColorwayByID is the minimum surface that must return it; a
  // full-replace UpdateColorwayRecipe is unsafe to edit-partially without a matching read). Lives
  // here rather than on the shared common.ColorwayFull so it never reaches the storefront read
  // path (admin.proto only). Money fields are stripped without costing:read.
  repeated common.TechCardColorwayUsage usages = 3;
}

// ColorwayCostInfo is the admin-only view of a product's confidential cost of goods and where
// that cost came from. source is "manual" | "tech_card" | "" (unset); tech-card ids are 0
// when absent.
message ColorwayCostInfo {
  google.type.Decimal cost_price = 1;
  common.ColorwayCostSource cost_price_source = 2; // R4: type change string->enum (same number)
  int32 cost_source_tech_card_id = 3; // R4: renamed from cost_price_tech_card_id (cost provenance, not ownership)
  reserved "cost_price_tech_card_id";
  google.protobuf.Timestamp cost_price_updated_at = 4;
  int32 primary_tech_card_id = 5;
}

message SyncColorwayCostFromOwningStyleRequest {
  int64 colorway_id = 1; // R8: renamed from product_id (same FK target = product.id)
  reserved "product_id";
  // R4/p019: the style is derived from the owner relation (the colourway's primary card) and is NEVER
  // repointed by a cost sync — cost provenance is separated from ownership. tech_card_id is removed.
  reserved 2;
  reserved "tech_card_id";
  uint64 expected_version = 3;
}

message SyncColorwayCostFromOwningStyleResponse {
  // the cost_price written, in base currency.
  google.type.Decimal cost_price = 1;
  string currency = 2;
  // the tech card the cost was sourced from (the owning style's primary card).
  int32 tech_card_id = 3;
  common.ColorwayCostSource source = 4; // R4: where the synced cost came from (STYLE)
}

// Lifecycle transition requests (R6). expected_version echoes tech_card.lock_version for future
