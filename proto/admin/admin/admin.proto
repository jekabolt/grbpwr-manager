syntax = "proto3";

package admin;

import "common/archive.proto";
import "common/buyer.proto";
import "common/dict.proto";
import "common/filter.proto";
import "common/fitting.proto";
import "common/fulfillment.proto";
import "common/hero.proto";
import "common/inventory.proto";
import "common/language.proto";
import "common/media.proto";
import "common/model.proto";
import "common/order.proto";
import "common/payment.proto";
import "common/product.proto";
import "common/production.proto";
import "common/promo.proto";
import "common/sample.proto";
import "common/shipment.proto";
import "common/support.proto";
import "common/task.proto";
import "common/techcard.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/type/decimal.proto";

option go_package = "github.com/jekabolt/grbpwr-products-manager/proto/admin;admin";

service AdminService {
  // KEY VALUE DICTIONARY

  // Retrieves a key-value dictionary.
  rpc GetDictionary(GetDictionaryRequest) returns (GetDictionaryResponse) {
    option (google.api.http) = {get: "/api/admin/dictionary"};
  }

  // BUCKET MANAGER

  // UploadContentImage uploads an image to a specific folder with a specified name.
  rpc UploadContentImage(UploadContentImageRequest) returns (UploadContentImageResponse) {
    option (google.api.http) = {
      post: "/api/admin/content/image"
      body: "*"
    };
  }

  // UploadContentVideo uploads a video to a specific folder with a specified name.
  rpc UploadContentVideo(UploadContentVideoRequest) returns (UploadContentVideoResponse) {
    option (google.api.http) = {
      post: "/api/admin/content/video"
      body: "*"
    };
  }

  // UploadPattern uploads a PDF выкройка (cut pattern) to object storage and returns its
  // url. Used for both tech-card per-size patterns and fitting iteration patterns. The
  // file is stored raw (no image processing) and is NOT added to the media library.
  rpc UploadPattern(UploadPatternRequest) returns (UploadPatternResponse) {
    option (google.api.http) = {
      post: "/api/admin/content/pattern"
      body: "*"
    };
  }

  // DeleteFromBucket deletes objects specified by their keys.
  rpc DeleteFromBucket(DeleteFromBucketRequest) returns (DeleteFromBucketResponse) {
    option (google.api.http) = {delete: "/api/admin/content"};
  }

  // ListObjectsPaged lists all objects in the base folder.
  rpc ListObjectsPaged(ListObjectsPagedRequest) returns (ListObjectsPagedResponse) {
    option (google.api.http) = {get: "/api/admin/content"};
  }

  // PRODUCTS MANAGER

  // Adds a new product or updates an existing one.
  rpc UpsertProduct(UpsertProductRequest) returns (UpsertProductResponse) {
    option (google.api.http) = {
      post: "/api/admin/product/upsert"
      body: "*"
    };
  }

  // Retrieves a paginated list of products.
  rpc GetProductsPaged(GetProductsPagedRequest) returns (GetProductsPagedResponse) {
    option (google.api.http) = {get: "/api/admin/products/paged"};
  }

  // Gets a product by its ID.
  rpc GetProductByID(GetProductByIDRequest) returns (GetProductByIDResponse) {
    option (google.api.http) = {get: "/api/admin/product/{id}"};
  }

  // Deletes a product by its ID.
  rpc DeleteProductByID(DeleteProductByIDRequest) returns (DeleteProductByIDResponse) {
    option (google.api.http) = {delete: "/api/admin/product/{id}"};
  }

  // Updates the stock for a specific product size.
  rpc UpdateProductSizeStock(UpdateProductSizeStockRequest) returns (UpdateProductSizeStockResponse) {
    option (google.api.http) = {
      post: "/api/admin/stock/update"
      body: "*"
    };
  }

  // Forces a product's confidential cost_price to be (re)seeded from a tech card, overriding
  // any manual value. If tech_card_id is set it also becomes the product's primary card;
  // otherwise the product's existing primary card is used.
  rpc SyncProductCostFromTechCard(SyncProductCostFromTechCardRequest) returns (SyncProductCostFromTechCardResponse) {
    option (google.api.http) = {
      post: "/api/admin/product/cost/sync-from-tech-card"
      body: "*"
    };
  }

  // Lists stock change history with optional filters.
  rpc ListStockChangeHistory(ListStockChangeHistoryRequest) returns (ListStockChangeHistoryResponse) {
    option (google.api.http) = {get: "/api/admin/stock-change-history"};
  }

  // Lists stock changes with simplified format for reporting.
  rpc ListStockChanges(ListStockChangesRequest) returns (ListStockChangesResponse) {
    option (google.api.http) = {get: "/api/admin/stock-changes"};
  }

  // PROMO MANAGER

  // Adds a new promotional code
  rpc AddPromo(AddPromoRequest) returns (AddPromoResponse) {
    option (google.api.http) = {
      post: "/api/admin/promo/add"
      body: "*"
    };
  }

  // Lists all promotional codes
  rpc ListPromos(ListPromosRequest) returns (ListPromosResponse) {
    option (google.api.http) = {get: "/api/admin/promo/list"};
  }

  // Deletes a specific promotional code
  rpc DeletePromoCode(DeletePromoCodeRequest) returns (DeletePromoCodeResponse) {
    option (google.api.http) = {delete: "/api/admin/promo/{code}/delete"};
  }

  // Disables a specific promotional code
  rpc DisablePromoCode(DisablePromoCodeRequest) returns (DisablePromoCodeResponse) {
    option (google.api.http) = {
      post: "/api/admin/promo/{code}/disable"
      body: "*"
    };
  }

  // ORDER MANAGER

  // Retrieves an order by its ID
  rpc GetOrderByUUID(GetOrderByUUIDRequest) returns (GetOrderByUUIDResponse) {
    option (google.api.http) = {get: "/api/admin/order/{order_uuid}"};
  }

  // Updates shipping information for an order
  rpc SetTrackingNumber(SetTrackingNumberRequest) returns (SetTrackingNumberResponse) {
    option (google.api.http) = {
      post: "/api/admin/orders/{order_uuid}/set-tracking-number"
      body: "*"
    };
  }

  // Retrieves orders by their status payment method or email
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse) {
    option (google.api.http) = {
      post: "/api/admin/orders/list"
      body: "*"
    };
  }

  // Processes a refund for an order
  rpc RefundOrder(RefundOrderRequest) returns (RefundOrderResponse) {
    option (google.api.http) = {
      post: "/api/admin/orders/{order_uuid}/refund"
      body: "*"
    };
  }

  // Marks an order as delivered
  rpc DeliveredOrder(DeliveredOrderRequest) returns (DeliveredOrderResponse) {
    option (google.api.http) = {
      post: "/api/admin/orders/{order_uuid}/delivered"
      body: "*"
    };
  }

  // Retrieves metrics for a period. Request sections to include (empty = business only).
  // Supports: business, funnel, oos_impact, payment_failures, web_vitals, user_journeys,
  // session_duration, device_funnel, product_engagement, form_errors, exceptions, not_found,
  // hero_funnel, size_confidence, payment_recovery, checkout_timings, cohort_retention,
  // order_sequence, entry_products, revenue_pareto, spending_curve, category_loyalty,
  // inventory_health, size_run_efficiency.
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse) {
    option (google.api.http) = {get: "/api/admin/metrics"};
  }

  // GetDashboard returns a small, DB-trusted decision payload: headline revenue/orders/margin
  // (+ caveat), server-computed alerts, and short action lists (top by margin €, reorder,
  // clear, drop sell-through). Use GetMetrics for deep, sectioned drill-down.
  rpc GetDashboard(GetDashboardRequest) returns (GetDashboardResponse) {
    option (google.api.http) = {get: "/api/admin/dashboard"};
  }

  // GetStyleEconomics returns a single "style as a business case" card for one tech card: its
  // lifetime sales margin (all colourway SKUs), the R&D development-cost roll-up, the number of
  // fitting rounds, and a plan/fact production summary — one place tying a style's revenue to the
  // money spent developing and making it. Cost/margin fields are costing:read-gated.
  rpc GetStyleEconomics(GetStyleEconomicsRequest) returns (GetStyleEconomicsResponse) {
    option (google.api.http) = {get: "/api/admin/metrics/style-economics"};
  }

  // GetChannelRoasSettled returns per-channel ROAS/CAC computed from the AUTHORITATIVE settled order
  // revenue (task 20 step 2), attributing orders to channels server-side via the bq_order_channel map
  // (order.ga_client_id → last non-direct UTM). Unlike the GA4-revenue campaign attribution, the
  // numerator is real settled base revenue and CAC is per-channel. Read alongside GetMetrics'
  // GA4-based attribution for upper-funnel context.
  rpc GetChannelRoasSettled(GetChannelRoasSettledRequest) returns (GetChannelRoasSettledResponse) {
    option (google.api.http) = {get: "/api/admin/metrics/channel-roas-settled"};
  }

  // Reads the operator-tunable thresholds behind the dashboard alerts.
  rpc GetAlertSettings(GetAlertSettingsRequest) returns (GetAlertSettingsResponse) {
    option (google.api.http) = {get: "/api/admin/dashboard/alert-settings"};
  }

  // Updates the operator-tunable dashboard alert thresholds.
  rpc UpsertAlertSettings(UpsertAlertSettingsRequest) returns (UpsertAlertSettingsResponse) {
    option (google.api.http) = {
      post: "/api/admin/dashboard/alert-settings/upsert"
      body: "*"
    };
  }

  // Sets per-SKU inventory reorder targets used by the inventory-health metrics.
  rpc UpsertInventoryTargets(UpsertInventoryTargetsRequest) returns (UpsertInventoryTargetsResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/inventory/targets/upsert"
      body: "*"
    };
  }

  // Records operator-entered marketing spend per channel per day, used for ROAS.
  rpc UpsertChannelSpend(UpsertChannelSpendRequest) returns (UpsertChannelSpendResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/channel-spend/upsert"
      body: "*"
    };
  }

  // UpsertOpexEntries records the fixed-cost (OPEX) journal — one amount per month per category,
  // base currency — feeding the dashboard operating result (task 22). Upserts on (month, category).
  rpc UpsertOpexEntries(UpsertOpexEntriesRequest) returns (UpsertOpexEntriesResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/upsert"
      body: "*"
    };
  }

  // UpsertOpexLines writes OPEX line items (NF-08) — each with its own currency (folded to base) and
  // a label — upserting on (month, category, label). Requires costing:write.
  rpc UpsertOpexLines(UpsertOpexLinesRequest) returns (UpsertOpexLinesResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/lines/upsert"
      body: "*"
    };
  }

  // DeleteOpexLine removes one OPEX line by id. Requires costing:write.
  rpc DeleteOpexLine(DeleteOpexLineRequest) returns (DeleteOpexLineResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/lines/delete"
      body: "*"
    };
  }

  // ListOpexLines returns OPEX lines within an inclusive month range, optional category. Requires
  // costing:read (returns empty otherwise — the figures are confidential cost data).
  rpc ListOpexLines(ListOpexLinesRequest) returns (ListOpexLinesResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/lines/list"
      body: "*"
    };
  }

  // UpsertOpexRecurring inserts (id==0) or updates a recurring OPEX template (salary, subscription,
  // rent) materialised into monthly lines by a worker. Requires costing:write.
  rpc UpsertOpexRecurring(UpsertOpexRecurringRequest) returns (UpsertOpexRecurringResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/recurring/upsert"
      body: "*"
    };
  }

  // ArchiveOpexRecurring stops a recurring template from materialising further months. Requires
  // costing:write.
  rpc ArchiveOpexRecurring(ArchiveOpexRecurringRequest) returns (ArchiveOpexRecurringResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/recurring/archive"
      body: "*"
    };
  }

  // ListOpexRecurring returns recurring OPEX templates (active-only unless include_archived).
  // Requires costing:read (returns empty otherwise).
  rpc ListOpexRecurring(ListOpexRecurringRequest) returns (ListOpexRecurringResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/opex/recurring/list"
      body: "*"
    };
  }

  // UpsertEmployee inserts (id==0) or updates an employee-registry row — the person behind a salary
  // OpexRecurring template (gap-07 v2 A). Requires analytics:write.
  rpc UpsertEmployee(UpsertEmployeeRequest) returns (UpsertEmployeeResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/employees/upsert"
      body: "*"
    };
  }

  // ArchiveEmployee soft-archives an employee; linked recurring templates keep their employee_id.
  // Requires analytics:write.
  rpc ArchiveEmployee(ArchiveEmployeeRequest) returns (ArchiveEmployeeResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/employees/archive"
      body: "*"
    };
  }

  // ListEmployees returns registry rows (active-only unless include_archived). Requires analytics:read.
  rpc ListEmployees(ListEmployeesRequest) returns (ListEmployeesResponse) {
    option (google.api.http) = {
      post: "/api/admin/metrics/employees/list"
      body: "*"
    };
  }

  // Cancels an order
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse) {
    option (google.api.http) = {
      post: "/api/admin/orders/{order_uuid}/cancel"
      body: "*"
    };
  }

  // Adds a comment to an order
  rpc AddOrderComment(AddOrderCommentRequest) returns (AddOrderCommentResponse) {
    option (google.api.http) = {
      post: "/api/admin/orders/{order_uuid}/comment"
      body: "*"
    };
  }

  // Creates a custom order with bank_invoice or cash payment (admin-only, supports custom prices).
  rpc CreateCustomOrder(CreateCustomOrderRequest) returns (CreateCustomOrderResponse) {
    option (google.api.http) = {
      post: "/api/admin/orders/custom"
      body: "*"
    };
  }

  // HERO MANAGER

  // Adds a new hero
  rpc AddHero(AddHeroRequest) returns (AddHeroResponse) {
    option (google.api.http) = {
      post: "/api/admin/hero/add"
      body: "*"
    };
  }

  // ARCHIVE MANAGER

  // AddArchive creates a new archive.
  rpc AddArchive(AddArchiveRequest) returns (AddArchiveResponse) {
    option (google.api.http) = {
      post: "/api/admin/archive/add"
      body: "*"
    };
  }

  rpc UpdateArchive(UpdateArchiveRequest) returns (UpdateArchiveResponse) {
    option (google.api.http) = {
      post: "/api/admin/archive/update"
      body: "*"
    };
  }

  // DeleteArchiveById deletes an archive by ID.
  rpc DeleteArchiveById(DeleteArchiveByIdRequest) returns (DeleteArchiveByIdResponse) {
    option (google.api.http) = {delete: "/api/admin/archive/{id}"};
  }

  rpc GetArchiveByID(GetArchiveByIDRequest) returns (GetArchiveByIDResponse) {
    option (google.api.http) = {get: "/api/admin/archive/{id}"};
  }

  // MODEL MANAGER
  // NOTE on ordering: grpc-gateway's mux prepends handlers, so the LAST-declared
  // route for a given method is matched FIRST. The literal `…/list` GET route is
  // therefore declared AFTER the `…/{id}` GET route; otherwise GET /model/list
  // would be matched by GET /model/{id} and "list" parsed as an id.

  // AddModel creates a new fit-model profile.
  rpc AddModel(AddModelRequest) returns (AddModelResponse) {
    option (google.api.http) = {
      post: "/api/admin/model/add"
      body: "*"
    };
  }

  // GetModel returns a fit-model profile by id.
  rpc GetModel(GetModelRequest) returns (GetModelResponse) {
    option (google.api.http) = {get: "/api/admin/model/{id}"};
  }

  // UpdateModel updates a fit-model profile.
  rpc UpdateModel(UpdateModelRequest) returns (UpdateModelResponse) {
    option (google.api.http) = {
      post: "/api/admin/model/update"
      body: "*"
    };
  }

  // DeleteModel deletes a fit-model profile by id.
  rpc DeleteModel(DeleteModelRequest) returns (DeleteModelResponse) {
    option (google.api.http) = {delete: "/api/admin/model/{id}"};
  }

  // ListModels lists fit-model profiles (paged). Declared last on purpose (see
  // ordering note above) so GET /model/list is not shadowed by GET /model/{id}.
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse) {
    option (google.api.http) = {get: "/api/admin/model/list"};
  }

  // FITTING MANAGER

  // AddFitting creates a new fitting session.
  rpc AddFitting(AddFittingRequest) returns (AddFittingResponse) {
    option (google.api.http) = {
      post: "/api/admin/fitting/add"
      body: "*"
    };
  }

  // GetFitting returns a fitting session by id.
  rpc GetFitting(GetFittingRequest) returns (GetFittingResponse) {
    option (google.api.http) = {get: "/api/admin/fitting/{id}"};
  }

  // UpdateFitting updates a fitting session.
  rpc UpdateFitting(UpdateFittingRequest) returns (UpdateFittingResponse) {
    option (google.api.http) = {
      post: "/api/admin/fitting/update"
      body: "*"
    };
  }

  // DeleteFitting deletes a fitting session by id.
  rpc DeleteFitting(DeleteFittingRequest) returns (DeleteFittingResponse) {
    option (google.api.http) = {delete: "/api/admin/fitting/{id}"};
  }

  // ListFittings lists fitting sessions (paged, optional product/model filter).
  // Declared last on purpose (see ListModels ordering note) so GET /fitting/list
  // is not shadowed by GET /fitting/{id}.
  rpc ListFittings(ListFittingsRequest) returns (ListFittingsResponse) {
    option (google.api.http) = {get: "/api/admin/fitting/list"};
  }

  // SAMPLES (new-flow NF-04): sewn prototypes of a style, with a composed cost.
  rpc AddSample(AddSampleRequest) returns (AddSampleResponse) {
    option (google.api.http) = {
      post: "/api/admin/sample/add"
      body: "*"
    };
  }
  rpc UpdateSample(UpdateSampleRequest) returns (UpdateSampleResponse) {
    option (google.api.http) = {
      post: "/api/admin/sample/update"
      body: "*"
    };
  }
  rpc DeleteSample(DeleteSampleRequest) returns (DeleteSampleResponse) {
    option (google.api.http) = {delete: "/api/admin/sample/{id}"};
  }
  rpc GetSample(GetSampleRequest) returns (GetSampleResponse) {
    option (google.api.http) = {get: "/api/admin/sample/{id}"};
  }
  rpc ListSamples(ListSamplesRequest) returns (ListSamplesResponse) {
    option (google.api.http) = {get: "/api/admin/sample/list"};
  }

  // TASK MANAGER
  // Internal team kanban (NOT customer orders). Same list-after-{id} route
  // ordering as fitting/models: GET /task/list is declared AFTER GET /task/{id}
  // so it is not shadowed.

  // AddTask creates a new kanban task from its content plus placement (target
  // board + optional initial column). Server sets created_by (from JWT) and
  // appends the card to the end of its (board,status) column (position).
  rpc AddTask(AddTaskRequest) returns (AddTaskResponse) {
    option (google.api.http) = {
      post: "/api/admin/task/add"
      body: "*"
    };
  }

  // GetTask returns a task by id.
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse) {
    option (google.api.http) = {get: "/api/admin/task/{id}"};
  }

  // UpdateTask replaces a task's content (title, description, assignee, priority,
  // due_date, labels, media, entity links). Placement — board, column (status),
  // ordering — is NOT touched here; it changes only through MoveTask.
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse) {
    option (google.api.http) = {
      post: "/api/admin/task/update"
      body: "*"
    };
  }

  // MoveTask changes a task's placement: its board, its column (status), and/or
  // its order within a column (position) — a card can be dragged across columns
  // and across boards. This is the drag-and-drop endpoint; the server
  // re-sequences sibling positions as needed.
  rpc MoveTask(MoveTaskRequest) returns (MoveTaskResponse) {
    option (google.api.http) = {
      post: "/api/admin/task/move"
      body: "*"
    };
  }

  // DeleteTask deletes a task by id (cascades its comments).
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse) {
    option (google.api.http) = {delete: "/api/admin/task/{id}"};
  }

  // AddTaskComment appends a comment to a task. Server sets author from JWT.
  rpc AddTaskComment(AddTaskCommentRequest) returns (AddTaskCommentResponse) {
    option (google.api.http) = {
      post: "/api/admin/task/comment/add"
      body: "*"
    };
  }

  // ListTaskComments returns a task's comments, oldest first.
  rpc ListTaskComments(ListTaskCommentsRequest) returns (ListTaskCommentsResponse) {
    option (google.api.http) = {get: "/api/admin/task/{task_id}/comments"};
  }

  // ListTasks lists tasks with optional board/status/assignee filters. Declared
  // last (see route-ordering note above) so GET /task/list is not shadowed by
  // GET /task/{id}.
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {
    option (google.api.http) = {get: "/api/admin/task/list"};
  }

  // ArchiveTask soft-archives a task: it is hidden from the board and the default
  // list (restorable), and its former (board,status) column is re-sequenced so
  // positions stay gap-free. Placement is otherwise preserved.
  rpc ArchiveTask(ArchiveTaskRequest) returns (ArchiveTaskResponse) {
    option (google.api.http) = {
      post: "/api/admin/task/archive"
      body: "*"
    };
  }

  // UnarchiveTask restores an archived task, appending it to the end of its
  // (board,status) column.
  rpc UnarchiveTask(UnarchiveTaskRequest) returns (UnarchiveTaskResponse) {
    option (google.api.http) = {
      post: "/api/admin/task/unarchive"
      body: "*"
    };
  }

  // AddTaskChecklistItem appends a checklist item (subtask) to a task.
  rpc AddTaskChecklistItem(AddTaskChecklistItemRequest) returns (AddTaskChecklistItemResponse) {
    option (google.api.http) = {
      post: "/api/admin/task/checklist/add"
      body: "*"
    };
  }

  // SetTaskChecklistItemDone sets a checklist item's done flag.
  rpc SetTaskChecklistItemDone(SetTaskChecklistItemDoneRequest) returns (SetTaskChecklistItemDoneResponse) {
    option (google.api.http) = {
      post: "/api/admin/task/checklist/done"
      body: "*"
    };
  }

  // DeleteTaskChecklistItem removes a checklist item.
  rpc DeleteTaskChecklistItem(DeleteTaskChecklistItemRequest) returns (DeleteTaskChecklistItemResponse) {
    option (google.api.http) = {delete: "/api/admin/task/checklist/{id}"};
  }

  // ORDER FULFILLMENT BOARD
  // A kanban PROJECTION of orders (NOT a copy): columns map 1:1 to real order
  // status (To Fulfill=confirmed, Shipped, Delivered). Ship/deliver call the real
  // order transitions; only the annotation (assignee/notes/checklist) is
  // board-owned, so board state can never drift from the order's true status.
  // These are gated by a dedicated `fulfillment` RBAC section so a warehouse role
  // can fulfill without full `orders:write` (which includes refunds/cancels).
  // GET /fulfillment/board and /fulfillment/card/{order_uuid} are distinct paths
  // (no route shadowing).

  // GetFulfillmentBoard returns the three columns of cards (compact order +
  // annotation summary), oldest order first within each column.
  rpc GetFulfillmentBoard(GetFulfillmentBoardRequest) returns (GetFulfillmentBoardResponse) {
    option (google.api.http) = {get: "/api/admin/fulfillment/board"};
  }

  // GetFulfillmentCard returns full order detail plus the full annotation
  // (assignee, notes, checklist) for one order.
  rpc GetFulfillmentCard(GetFulfillmentCardRequest) returns (GetFulfillmentCardResponse) {
    option (google.api.http) = {get: "/api/admin/fulfillment/card/{order_uuid}"};
  }

  // SetFulfillmentAssignee sets (or clears, with "") the order's fulfillment
  // assignee, lazily creating the annotation.
  rpc SetFulfillmentAssignee(SetFulfillmentAssigneeRequest) returns (SetFulfillmentAssigneeResponse) {
    option (google.api.http) = {
      post: "/api/admin/fulfillment/assignee"
      body: "*"
    };
  }

  // SetFulfillmentNotes sets the order's internal packing notes.
  rpc SetFulfillmentNotes(SetFulfillmentNotesRequest) returns (SetFulfillmentNotesResponse) {
    option (google.api.http) = {
      post: "/api/admin/fulfillment/notes"
      body: "*"
    };
  }

  // AddFulfillmentChecklistItem appends a packing-checklist item to an order.
  rpc AddFulfillmentChecklistItem(AddFulfillmentChecklistItemRequest) returns (AddFulfillmentChecklistItemResponse) {
    option (google.api.http) = {
      post: "/api/admin/fulfillment/checklist/add"
      body: "*"
    };
  }

  // SetFulfillmentChecklistItemDone sets a packing-checklist item's done flag.
  rpc SetFulfillmentChecklistItemDone(SetFulfillmentChecklistItemDoneRequest) returns (SetFulfillmentChecklistItemDoneResponse) {
    option (google.api.http) = {
      post: "/api/admin/fulfillment/checklist/done"
      body: "*"
    };
  }

  // DeleteFulfillmentChecklistItem removes a packing-checklist item.
