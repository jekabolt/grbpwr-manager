// PackagingRecipeLine is one stored line of a packaging recipe for a scope target (PLM rework §2.8,
// Q3): a material consumed on ship — qty_per_order once per shipment (a box) plus qty_per_item × the
// order's unit count (a dust bag). Resolution at order time is product → style → global (first match
// wins). material_name / material_unit are resolved server-side for display and ignored on write.
message PackagingRecipeLine {
  int32 id = 1; // read-only
  string scope = 2; // global | style | product
  int32 tech_card_id = 3; // set iff scope=style
  int32 product_id = 4; // set iff scope=product
  int32 material_id = 5;
  string material_name = 6; // read-only (display)
  string material_unit = 7; // read-only (display)
  google.type.Decimal qty_per_order = 8; // consumed once per shipped order, >= 0
  google.type.Decimal qty_per_item = 9; // consumed per unit in the order, >= 0
  bool active = 10;
}

