  string material_name = 2;
  string unit = 3;
  google.type.Decimal required = 4; // Σ over lines: norm(colourway,size) × planned_qty × (1 + wastage%)
  google.type.Decimal on_hand = 5; // material_stock.on_hand (NF-01)
  google.type.Decimal issued = 6; // net already issued to this run (issue_production − return_production)
  google.type.Decimal shortage = 7; // max(0, required − issued − on_hand)
  bool has_size_norms = 8; // false when some contributing norm was per-garment, not size-graded (rougher estimate)
  google.type.Decimal issued_variance = 9; // issued − required: >0 over-issued vs plan (scrap/overuse), <0 under-issued/leftover (gap-04). Meaningful after issuing/receive.
}

message GetProductionRunMaterialPlanResponse {
  repeated MaterialPlanRow rows = 1;
  repeated string caveats = 2; // BOM lines without material_id, colourways without norms, lines without a product
}

