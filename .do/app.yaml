features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: grbpwr-manager
    cors:
      allow_headers:
      - Content-Type
      - Authorization
      - X-Requested-With
      - Accept
      - Origin
      - Grpc-Metadata-Authorization
      allow_methods:
      - GET
      - HEAD
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
      allow_origins:
      - exact: https://grbpwr.com
      - exact: https://backend.grbpwr.com
      - regex: ^http://localhost(:[0-9]+)?$
      - regex: ^https://[a-z0-9-]+\.github\.io$
      expose_headers:
      - Content-Length
      - X-Request-Id
      max_age: 86400s
    match:
      path:
        prefix: /
name: grbpwr-backend
region: fra
services:
- dockerfile_path: /Dockerfile
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${production-database.DATABASE_URL}
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${mysql-grbpwr.DATABASE_URL}
  github:
    branch: master
    repo: jekabolt/grbpwr-manager
  health_check:
    failure_threshold: 9
    http_path: /readyz
    period_seconds: 10
    success_threshold: 1
    timeout_seconds: 1
  http_port: 8081
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  liveness_health_check:
    failure_threshold: 9
    http_path: /livez
    period_seconds: 10
    success_threshold: 1
    timeout_seconds: 1
  name: grbpwr-manager
vpc:
  id: b5aeea90-1829-41d3-82f5-bb2cf3827c91
